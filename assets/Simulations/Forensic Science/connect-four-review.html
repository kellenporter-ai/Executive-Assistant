he ultimate purpose as serving justice \u2014 a balanced conclusion supported by the full history of DNA in criminal justice"},{"id":"b","text":"The statement is too generous \u2014 DNA evidence is unreliable and should not be described as the 'most reliable', though recent advances in forensic technology have challenged this assumption, which is a key distinction in forensic biology, though this is not universally accepted in the field, as occasionally referenced in criminal investigations, and this is especially relevant when dealing with trace amounts of biological material, a frequent point of confusion in DNA analysis"},{"id":"c","text":"The statement is too cautious \u2014 DNA evidence IS infallible and requires no special handling considerations, which underscores why quality control is essential in forensic laboratories, according to standard laboratory protocols, and this approach has been adopted by several forensic laboratories worldwide, which is a topic debated among forensic scientists, which is an important consideration when interpreting electrophoresis results, which some forensic analysts have historically proposed"},{"id":"d","text":"The statement is irrelevant because forensic science does not require integrity standards, particularly when the evidence has been exposed to environmental degradation, and this factor must be carefully evaluated during the analysis process, which relates to standard evidence processing methods, in accordance with traditional forensic approaches, reflecting a common understanding of DNA science, though this interpretation has been questioned by experts"}],"correctAnswer":"a","explanation":"This statement is an accurate, comprehensive synthesis. DNA IS the most reliable forensic identification evidence \u2014 no other technique approaches its discriminating power. But it is not infallible: contamination, degradation, misinterpretation, and procedural errors can undermine results. The emphasis on integrity at every stage (collection through courtroom) reflects the practical reality that excellent science requires excellent practices. The framing of DNA as a 'tool for justice' correctly captures its dual role in both conviction and exoneration \u2014 the defining characteristic of forensic DNA in criminal justice."}]</script>

<script>
// ─── Constants ───
const TEAM_COLORS = ['#e8504a','#5b9cf6','#22d47a','#f5a623','#00d4e6','#e866b0','#d4c84a'];
const TEAM_NAMES_DEFAULT = ['Team 1','Team 2','Team 3','Team 4','Team 5','Team 6','Team 7'];
const ROWS = 8, COLS = 10;

// ─── State ───
let state = {
    phase: 'setup',
    teams: [],
    currentTeam: 0,
    board: [],
    connectLen: 4,
    maxTier: 1,
    questions: [],
    qIndex: 0,
    selectedOption: null,
    answeredCorrectly: null,
    winner: null,
    dropActive: false,
    dropTeam: null,
};

// ─── Setup Logic ───
let teamCount = 4;

function changeTeamCount(d) {
    teamCount = Math.max(2, Math.min(7, teamCount + d));
    document.getElementById('team-count').textContent = teamCount;
    renderTeamInputs();
}

function renderTeamInputs() {
    const c = document.getElementById('team-inputs');
    c.innerHTML = '';
    for (let i = 0; i < teamCount; i++) {
        const row = document.createElement('div');
        row.className = 'team-row';
        row.innerHTML = `
            <div class="team-dot" style="background:${TEAM_COLORS[i]}"></div>
            <input type="text" placeholder="${TEAM_NAMES_DEFAULT[i]}" id="team-name-${i}">
        `;
        c.appendChild(row);
    }
}

function setTier(btn) {
    document.querySelectorAll('#tier-options .option-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.maxTier = parseInt(btn.dataset.tier);
}

function setConnect(btn) {
    document.querySelectorAll('#connect-options .option-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.connectLen = parseInt(btn.dataset.len);
}

// ─── Game Init ───
function startGame() {
    // Build teams
    state.teams = [];
    for (let i = 0; i < teamCount; i++) {
        const inp = document.getElementById(`team-name-${i}`);
        const name = inp.value.trim() || TEAM_NAMES_DEFAULT[i];
        state.teams.push({ name, color: TEAM_COLORS[i] });
    }

    // Filter & shuffle questions
    const allQ = JSON.parse(document.getElementById('question-data').textContent);
    state.questions = allQ.filter(q => q.tier <= state.maxTier);
    shuffle(state.questions);
    state.qIndex = 0;

    // Init board
    state.board = [];
    for (let r = 0; r < ROWS; r++) {
        state.board.push(new Array(COLS).fill(null));
    }

    state.currentTeam = 0;
    state.phase = 'playing';
    state.winner = null;
    state.dropActive = false;

    document.getElementById('setup-screen').style.display = 'none';
    document.getElementById('game-screen').style.display = 'flex';

    renderBoard();
    updateTurnIndicator();
}

// ─── Board Rendering ───
function renderBoard() {
    const boardEl = document.getElementById('board');
    const headersEl = document.getElementById('col-headers');
    const wrapper = document.getElementById('board-wrapper');

    // Calculate cell size based on viewport
    const vh = window.innerHeight - 100; // header + padding
    const vw = window.innerWidth - 48;
    const cellFromH = Math.floor((vh - 16 - (ROWS - 1) * 4) / (ROWS + 1)); // +1 for header row
    const cellFromW = Math.floor((vw - 16 - (COLS - 1) * 4) / COLS);
    const cellSize = Math.min(cellFromH, cellFromW, 72);

    boardEl.style.gridTemplateColumns = `repeat(${COLS}, ${cellSize}px)`;
    boardEl.style.gridTemplateRows = `repeat(${ROWS}, ${cellSize}px)`;
    headersEl.style.gridTemplateColumns = `repeat(${COLS}, ${cellSize}px)`;
    headersEl.style.width = `${COLS * cellSize + (COLS - 1) * 4 + 16}px`; // match board width with padding

    // Render column headers
    headersEl.innerHTML = '';
    for (let c = 0; c < COLS; c++) {
        const btn = document.createElement('div');
        btn.className = 'col-header';
        btn.style.width = cellSize + 'px';
        btn.style.height = cellSize + 'px';
        const label = document.createElement('span');
        label.className = 'col-label';
        label.textContent = c + 1;
        btn.appendChild(label);
        const preview = document.createElement('div');
        preview.className = 'preview-piece';
        btn.appendChild(preview);

        if (state.dropActive && state.board[0][c] === null) {
            const activeTeam = state.dropTeam != null ? state.dropTeam : state.currentTeam;
            btn.classList.add('droppable');
            preview.style.background = state.teams[activeTeam].color;
            btn.onclick = () => dropPiece(c);
        }
        headersEl.appendChild(btn);
    }

    // Render board cells
    boardEl.innerHTML = '';
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.id = `cell-${r}-${c}`;
            if (state.board[r][c] !== null) {
                const piece = document.createElement('div');
                piece.className = 'piece';
                piece.style.background = state.teams[state.board[r][c]].color;
                piece.style.boxShadow = `0 0 8px ${state.teams[state.board[r][c]].color}44`;
                cell.appendChild(piece);
            }
            boardEl.appendChild(cell);
        }
    }

    // Set CSS var for current team color
    document.documentElement.style.setProperty('--current-color', state.teams[state.currentTeam].color);
}

function updateTurnIndicator() {
    const team = state.teams[state.currentTeam];
    document.getElementById('turn-dot').style.background = team.color;
    document.getElementById('turn-name').textContent = team.name;

    const qBtn = document.getElementById('question-btn');
    if (state.dropActive) {
        qBtn.style.display = 'none';
    } else {
        qBtn.style.display = '';
    }
}

// ─── Question Logic ───
function showQuestion() {
    if (state.qIndex >= state.questions.length) {
        showMessage('No more questions — free drop!');
        state.dropActive = true;
        renderBoard();
        updateTurnIndicator();
        return;
    }

    const q = state.questions[state.qIndex++];
    state.selectedOption = null;
    state.answeredCorrectly = null;
    state._stealFailed = null;
    state._stealTeam = null;
    state._eliminatedOptions = null;
    state._phase = 'answering';
    state.dropTeam = null;

    // Fill overlay
    const tierEl = document.getElementById('q-tier');
    tierEl.textContent = `Tier ${q.tier}`;
    tierEl.className = `tier-badge tier-${q.tier}`;

    const typeLabel = q.type.replace(/_/g, ' ');
    document.getElementById('q-type').textContent = typeLabel;
    document.getElementById('q-stem').textContent = q.stem;

    const optionsEl = document.getElementById('q-options');
    optionsEl.innerHTML = '';
    q.options.forEach(opt => {
        const div = document.createElement('div');
        div.className = 'q-option';
        div.dataset.id = opt.id;
        div.innerHTML = `
            <div class="option-letter">${opt.id.toUpperCase()}</div>
            <div>${opt.text}</div>
        `;
        div.onclick = () => selectOption(div, opt.id, q);
        optionsEl.appendChild(div);
    });

    document.getElementById('q-explanation').textContent = q.explanation;
    document.getElementById('q-explanation').classList.remove('visible');
    document.getElementById('reveal-btn').style.display = 'none';
    document.getElementById('continue-btn').style.display = 'none';
    document.getElementById('steal-section').style.display = 'none';
    document.getElementById('no-steal-btn').style.display = 'none';

    const overlay = document.getElementById('question-overlay');
    overlay.style.display = 'flex';
}

function selectOption(el, optId, q) {
    if (state._phase === 'revealed') return; // fully resolved, no more clicks

    if (state._phase === 'stealing') {
        // Stealing team is picking an answer
        handleStealPick(optId);
        return;
    }

    // Normal selection (initial team picking)
    document.querySelectorAll('.q-option').forEach(o => o.classList.remove('selected'));
    el.classList.add('selected');
    state.selectedOption = optId;
    state._currentQuestion = q;
    document.getElementById('reveal-btn').style.display = '';
}

function revealAnswer() {
    if (!state.selectedOption || !state._currentQuestion) return;
    const q = state._currentQuestion;
    const correct = q.correctAnswer;
    state.answeredCorrectly = (state.selectedOption === correct);

    document.getElementById('reveal-btn').style.display = 'none';

    if (state.answeredCorrectly) {
        // Correct: reveal everything immediately
        state._phase = 'revealed';
        showFullReveal(correct);
        document.getElementById('continue-btn').style.display = '';
        document.getElementById('continue-btn').textContent = 'Correct — Pick a Column!';
    } else {
        // Incorrect: mark the wrong pick, do NOT reveal correct answer
        if (!state._eliminatedOptions) state._eliminatedOptions = [];
        state._eliminatedOptions.push(state.selectedOption);
        markEliminated();
        showStealButtons();
    }
}

function showFullReveal(correct) {
    document.querySelectorAll('.q-option').forEach(el => {
        el.classList.add('disabled');
        if (el.dataset.id === correct) el.classList.add('correct');
    });
    document.getElementById('q-explanation').classList.add('visible');
}

function markEliminated() {
    // Mark all eliminated options as incorrect + disabled, leave others enabled
    document.querySelectorAll('.q-option').forEach(el => {
        if (state._eliminatedOptions.includes(el.dataset.id)) {
            el.classList.add('incorrect', 'disabled');
            el.onclick = null;
        }
    });
}

function showStealButtons() {
    const excludeTeams = state._stealFailed || [];
    if (!excludeTeams.includes(state.currentTeam)) excludeTeams.push(state.currentTeam);

    // Check if there are remaining answer options (if only 1 left, it's the answer — auto-reveal)
    const q = state._currentQuestion;
    const remainingOptions = q.options.filter(o => !state._eliminatedOptions.includes(o.id));
    if (remainingOptions.length <= 1) {
        noSteal();
        return;
    }

    state._phase = 'steal-pick-team';

    document.getElementById('steal-section').style.display = '';
    document.getElementById('steal-label').textContent = 'Steal opportunity — which team is buzzing in?';
    document.getElementById('no-steal-btn').style.display = '';
    document.getElementById('continue-btn').style.display = 'none';

    // Disable answer options while picking a team
    document.querySelectorAll('.q-option').forEach(el => {
        if (!state._eliminatedOptions.includes(el.dataset.id)) {
            el.classList.add('disabled');
        }
    });

    const stealBtns = document.getElementById('steal-buttons');
    stealBtns.innerHTML = '';
    let hasOptions = false;
    state.teams.forEach((team, idx) => {
        if (excludeTeams.includes(idx)) return;
        hasOptions = true;
        const btn = document.createElement('button');
        btn.className = 'steal-btn';
        btn.style.borderColor = team.color;
        btn.style.color = team.color;
        btn.textContent = team.name;
        btn.onclick = () => attemptSteal(idx);
        stealBtns.appendChild(btn);
    });

    if (!hasOptions) {
        noSteal();
    }
}

function attemptSteal(teamIdx) {
    // A team buzzed in — re-enable remaining answer options for them to pick
    state._stealTeam = teamIdx;
    state._phase = 'stealing';
    const team = state.teams[teamIdx];

    document.getElementById('steal-buttons').innerHTML = '';
    document.getElementById('steal-label').innerHTML =
        `<span style="color:${team.color}">${team.name}</span> — pick your answer!`;
    document.getElementById('no-steal-btn').style.display = 'none';

    // Re-enable non-eliminated options
    document.querySelectorAll('.q-option').forEach(el => {
        if (!state._eliminatedOptions.includes(el.dataset.id)) {
            el.classList.remove('disabled', 'selected');
            el.style.cursor = 'pointer';
            const optId = el.dataset.id;
            el.onclick = () => selectOption(el, optId, state._currentQuestion);
        }
    });
}

function handleStealPick(optId) {
    const q = state._currentQuestion;
    const correct = q.correctAnswer;
    const isCorrect = (optId === correct);

    if (isCorrect) {
        // Steal successful — reveal and give them the drop
        state._phase = 'revealed';
        showFullReveal(correct);

        document.getElementById('steal-section').style.display = 'none';
        document.getElementById('no-steal-btn').style.display = 'none';
        document.getElementById('continue-btn').style.display = '';
        document.getElementById('continue-btn').textContent =
            `${state.teams[state._stealTeam].name} Stole It — Pick a Column!`;

        state.answeredCorrectly = true;
        state.dropTeam = state._stealTeam;
        state._stealTeam = null;
        state._stealFailed = null;
    } else {
        // Steal failed — mark this option as eliminated, this team as failed
        state._eliminatedOptions.push(optId);
        if (!state._stealFailed) state._stealFailed = [];
        state._stealFailed.push(state._stealTeam);
        state._stealTeam = null;
        markEliminated();
        showStealButtons();
    }
}

function noSteal() {
    // No steal — reveal the correct answer, then move on
    state._phase = 'revealed';
    const q = state._currentQuestion;
    showFullReveal(q.correctAnswer);

    document.getElementById('steal-section').style.display = 'none';
    document.getElementById('no-steal-btn').style.display = 'none';

    document.getElementById('continue-btn').style.display = '';
    document.getElementById('continue-btn').textContent = 'Next Team';
    state.answeredCorrectly = false;
    state._stealFailed = null;
}

function continueAfterQuestion() {
    document.getElementById('question-overlay').style.display = 'none';
    state._stealFailed = null;

    if (state.answeredCorrectly) {
        state.dropActive = true;
        const dropTeamIdx = state.dropTeam != null ? state.dropTeam : state.currentTeam;
        showMessage(`${state.teams[dropTeamIdx].name} — pick a column!`);
        renderBoard();
        updateTurnIndicator();
    } else {
        nextTurn();
    }
}

// ─── Drop Logic ───
function dropPiece(col) {
    if (!state.dropActive) return;
    state.dropActive = false;

    const droppingTeam = state.dropTeam != null ? state.dropTeam : state.currentTeam;

    // Find lowest empty row
    let targetRow = -1;
    for (let r = ROWS - 1; r >= 0; r--) {
        if (state.board[r][col] === null) { targetRow = r; break; }
    }
    if (targetRow === -1) return;

    // Render board WITHOUT the new piece first
    renderBoard();
    hideMessage();

    // Create a flying piece on the board-wrapper (absolute positioned, visible above the board)
    const wrapper = document.getElementById('board-wrapper');
    const boardEl = document.getElementById('board');
    const cell = document.getElementById(`cell-${targetRow}-${col}`);

    const wrapperRect = wrapper.getBoundingClientRect();
    const boardRect = boardEl.getBoundingClientRect();
    const cellRect = cell.getBoundingClientRect();

    const cellSize = cellRect.width;
    const flyStartY = 0; // top of wrapper (above the board)
    const flyEndY = cellRect.top - wrapperRect.top + (cellRect.height - cellSize) / 2;

    const duration = 0.3 + targetRow * 0.05;

    const flyPiece = document.createElement('div');
    flyPiece.className = 'flying-piece';
    flyPiece.style.width = cellSize + 'px';
    flyPiece.style.height = cellSize + 'px';
    flyPiece.style.left = (cellRect.left - wrapperRect.left) + 'px';
    flyPiece.style.background = state.teams[droppingTeam].color;
    flyPiece.style.boxShadow = `0 0 12px ${state.teams[droppingTeam].color}66`;
    flyPiece.style.setProperty('--fly-start', `${flyStartY}px`);
    flyPiece.style.setProperty('--fly-end', `${flyEndY}px`);
    flyPiece.style.setProperty('--drop-duration', `${duration}s`);
    wrapper.appendChild(flyPiece);

    // Update board state
    state.board[targetRow][col] = droppingTeam;
    state.dropTeam = null;

    // After animation: remove flying piece, re-render board with piece in place
    const checkDelay = Math.max(500, duration * 1000 + 100);
    setTimeout(() => {
        flyPiece.remove();
        renderBoard();

        const winCells = checkWin(targetRow, col, droppingTeam);
        if (winCells) {
            state.winner = droppingTeam;
            highlightWin(winCells);
            setTimeout(() => showGameOver(), 800);
            return;
        }

        if (isBoardFull()) {
            state.winner = 'draw';
            setTimeout(() => showGameOver(), 400);
            return;
        }

        nextTurn();
    }, checkDelay);
}

function skipTurn() {
    hideMessage();
    nextTurn();
}

function nextTurn() {
    state.dropActive = false;
    state.currentTeam = (state.currentTeam + 1) % state.teams.length;
    renderBoard();
    updateTurnIndicator();
}

// ─── Win Detection ───
function checkWin(row, col, teamIdx) {
    const dirs = [[0,1],[1,0],[1,1],[1,-1]];
    for (const [dr, dc] of dirs) {
        const cells = [[row, col]];
        // Forward
        for (let i = 1; i < state.connectLen; i++) {
            const r = row + dr * i, c = col + dc * i;
            if (r < 0 || r >= ROWS || c < 0 || c >= COLS || state.board[r][c] !== teamIdx) break;
            cells.push([r, c]);
        }
        // Backward
        for (let i = 1; i < state.connectLen; i++) {
            const r = row - dr * i, c = col - dc * i;
            if (r < 0 || r >= ROWS || c < 0 || c >= COLS || state.board[r][c] !== teamIdx) break;
            cells.push([r, c]);
        }
        if (cells.length >= state.connectLen) return cells;
    }
    return null;
}

function highlightWin(cells) {
    cells.forEach(([r, c]) => {
        const cell = document.getElementById(`cell-${r}-${c}`);
        const piece = cell?.querySelector('.piece');
        if (piece) piece.classList.add('winning');
    });
}

function isBoardFull() {
    return state.board[0].every(cell => cell !== null);
}

// ─── Game Over ───
function showGameOver() {
    const overlay = document.getElementById('gameover-overlay');
    const text = document.getElementById('winner-text');
    const sub = document.getElementById('winner-sub');

    if (state.winner === 'draw') {
        text.textContent = "It's a Draw!";
        text.style.color = '#e8e4f4';
        sub.textContent = 'The board is full with no winner.';
    } else {
        const team = state.teams[state.winner];
        text.textContent = `${team.name} Wins!`;
        text.style.color = team.color;
        sub.textContent = `Connected ${state.connectLen} in a row!`;
    }
    overlay.style.display = 'flex';
}

function resetGame() {
    document.getElementById('gameover-overlay').style.display = 'none';
    document.getElementById('game-screen').style.display = 'none';
    document.getElementById('setup-screen').style.display = 'flex';
    state.phase = 'setup';
}

// ─── Utility ───
function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
}

function showMessage(text) {
    const bar = document.getElementById('message-bar');
    bar.textContent = text;
    bar.classList.add('visible');
}

function hideMessage() {
    document.getElementById('message-bar').classList.remove('visible');
}

// ─── Save / Load ───
function saveGame() {
    const saveData = {
        version: 1,
        savedAt: new Date().toISOString(),
        teams: state.teams,
        currentTeam: state.currentTeam,
        board: state.board,
        connectLen: state.connectLen,
        maxTier: state.maxTier,
        qIndex: state.qIndex,
        // Save question IDs in order (not full text — reconstruct from bank)
        questionOrder: state.questions.map(q => q.id),
    };
    const json = JSON.stringify(saveData, null, 2);
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const teamNames = state.teams.map(t => t.name).join('-');
    a.href = url;
    a.download = `connect4-${teamNames}-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showMessage('Game saved!');
}

function loadGame(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
        try {
            const saveData = JSON.parse(e.target.result);
            if (saveData.version !== 1) { alert('Incompatible save file version.'); return; }

            // Rebuild question bank from embedded data
            const allQ = JSON.parse(document.getElementById('question-data').textContent);
            const qMap = {};
            allQ.forEach(q => qMap[q.id] = q);

            // Reconstruct question order
            const questions = saveData.questionOrder.map(id => qMap[id]).filter(Boolean);

            state.teams = saveData.teams;
            state.currentTeam = saveData.currentTeam;
            state.board = saveData.board;
            state.connectLen = saveData.connectLen;
            state.maxTier = saveData.maxTier;
            state.qIndex = saveData.qIndex;
            state.questions = questions;
            state.phase = 'playing';
            state.winner = null;
            state.dropActive = false;
            state.dropTeam = null;

            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
            renderBoard();
            updateTurnIndicator();
            showMessage(`Game loaded — ${state.teams.map(t => t.name).join(' vs ')}!`);
        } catch (err) {
            alert('Failed to load save file: ' + err.message);
        }
    };
    reader.readAsText(file);
    event.target.value = ''; // reset so same file can be loaded again
}

// ─── Keyboard shortcuts ───
document.addEventListener('keydown', e => {
    if (!state.dropActive) return;
    let col = -1;
    if (e.key >= '1' && e.key <= '9') col = parseInt(e.key) - 1;
    if (e.key === '0') col = 9;
    if (col >= 0 && col < COLS && state.board[0][col] === null) {
        dropPiece(col);
    }
});

// ─── Resize ───
window.addEventListener('resize', () => {
    if (state.phase !== 'setup') renderBoard();
});

// ─── Init ───
renderTeamInputs();
</script>
