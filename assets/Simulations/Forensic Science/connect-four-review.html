<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect Four — DNA Profiling Review</title>
    <style>
        :root {
            --bg: #0f0720;
            --surface: #1a0e35;
            --border: rgba(160, 100, 255, 0.18);
            --text: #e8e4f4;
            --muted: #8a85a8;
            --purple: #9b6bff;
            --board-bg: #130a2a;
            --cell-bg: #0d0619;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%; height: 100%; overflow: hidden;
            background: var(--bg);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: var(--text);
        }

        /* ── Setup Screen ── */
        #setup-screen {
            display: flex; align-items: center; justify-content: center;
            width: 100%; height: 100%;
        }
        .setup-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 18px; padding: 36px 40px; max-width: 560px; width: 90%;
        }
        .setup-card h1 {
            font-size: 1.6rem; font-weight: 700; margin-bottom: 4px;
        }
        .setup-card .subtitle {
            font-size: 0.88rem; color: var(--muted); margin-bottom: 28px;
        }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block; font-size: 0.82rem; color: var(--muted);
            margin-bottom: 6px; font-weight: 600; text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .team-inputs { display: flex; flex-direction: column; gap: 8px; }
        .team-row {
            display: flex; align-items: center; gap: 10px;
        }
        .team-dot {
            width: 20px; height: 20px; border-radius: 50%; flex-shrink: 0;
            border: 2px solid rgba(255,255,255,0.15);
        }
        .team-row input {
            flex: 1; background: var(--board-bg); border: 1px solid var(--border);
            border-radius: 8px; padding: 8px 12px; color: var(--text);
            font-size: 0.9rem; outline: none;
        }
        .team-row input:focus { border-color: var(--purple); }

        .option-row {
            display: flex; gap: 8px; flex-wrap: wrap;
        }
        .option-btn {
            padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border);
            background: var(--board-bg); color: var(--text); cursor: pointer;
            font-size: 0.88rem; transition: all 0.15s;
        }
        .option-btn:hover { border-color: var(--purple); }
        .option-btn.active {
            background: rgba(155, 107, 255, 0.2); border-color: var(--purple);
            color: #fff;
        }

        .stepper {
            display: flex; align-items: center; gap: 12px;
        }
        .stepper button {
            width: 36px; height: 36px; border-radius: 8px; border: 1px solid var(--border);
            background: var(--board-bg); color: var(--text); cursor: pointer;
            font-size: 1.2rem; display: flex; align-items: center; justify-content: center;
        }
        .stepper button:hover { border-color: var(--purple); }
        .stepper span { font-size: 1.3rem; font-weight: 700; min-width: 30px; text-align: center; }

        .start-btn {
            width: 100%; padding: 14px; border-radius: 10px; border: none;
            background: linear-gradient(135deg, #9b6bff, #6b3fd4);
            color: #fff; font-size: 1rem; font-weight: 700; cursor: pointer;
            margin-top: 8px; transition: opacity 0.15s;
        }
        .start-btn:hover { opacity: 0.88; }

        /* ── Game Screen ── */
        #game-screen { display: none; width: 100%; height: 100%; flex-direction: column; }

        .game-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 24px; flex-shrink: 0;
        }
        .game-title { font-size: 1rem; font-weight: 600; color: var(--muted); }
        .turn-indicator {
            display: flex; align-items: center; gap: 10px;
            font-size: 1.15rem; font-weight: 700;
        }
        .turn-dot {
            width: 22px; height: 22px; border-radius: 50%;
            animation: pulse-dot 1.5s ease-in-out infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255,255,255,0.3); }
            50% { box-shadow: 0 0 0 8px rgba(255,255,255,0); }
        }
        .game-actions { display: flex; gap: 8px; }
        .action-btn {
            padding: 8px 18px; border-radius: 8px; border: 1px solid var(--border);
            background: var(--surface); color: var(--text); cursor: pointer;
            font-size: 0.85rem; font-weight: 600; transition: all 0.15s;
        }
        .action-btn:hover { border-color: var(--purple); }
        .action-btn.primary {
            background: linear-gradient(135deg, #9b6bff, #6b3fd4);
            border: none; color: #fff;
        }
        .action-btn.primary:hover { opacity: 0.88; }

        /* ── Board ── */
        .board-area {
            flex: 1; display: flex; align-items: center; justify-content: center;
            padding: 10px 24px 20px;
            overflow: hidden;
        }
        .board-wrapper {
            display: flex; flex-direction: column; align-items: center;
            max-height: 100%; max-width: 100%;
            position: relative;
        }

        /* Column headers (labels + drop buttons) */
        .col-headers {
            display: grid; gap: 4px;
        }
        .col-header {
            border-radius: 50%; border: 2px dashed transparent;
            background: transparent; cursor: default; transition: all 0.15s;
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }
        .col-label {
            font-size: 0.82rem; font-weight: 700; color: var(--muted);
            user-select: none;
        }
        .col-header.droppable {
            border-color: rgba(255,255,255,0.15); cursor: pointer;
        }
        .col-header.droppable:hover {
            border-color: var(--current-color, #fff);
            background: rgba(255,255,255,0.05);
        }
        .col-header.droppable:hover .col-label { opacity: 0; }
        .col-header .preview-piece {
            position: absolute; width: 60%; height: 60%; border-radius: 50%; opacity: 0;
            transition: opacity 0.15s;
        }
        .col-header.droppable:hover .preview-piece {
            opacity: 0.5;
        }

        .board {
            display: grid; gap: 4px;
            background: var(--surface); border: 3px solid var(--border);
            border-radius: 14px; padding: 8px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        .cell {
            aspect-ratio: 1; border-radius: 50%;
            background: var(--cell-bg);
            border: 2px solid rgba(255,255,255,0.04);
            position: relative; overflow: hidden;
        }
        .cell .piece {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 50%;
        }
        .piece.dropping {
            animation: drop-bounce var(--drop-duration, 0.4s) ease-in forwards;
        }
        .flying-piece {
            position: absolute; border-radius: 50%; z-index: 10;
            pointer-events: none;
            animation: fly-drop var(--drop-duration, 0.4s) ease-in forwards;
        }
        @keyframes drop-bounce {
            0% { transform: translateY(var(--drop-offset)); }
            70% { transform: translateY(0); }
            85% { transform: translateY(-8px); }
            100% { transform: translateY(0); }
        }
        @keyframes fly-drop {
            0% { top: var(--fly-start); }
            70% { top: var(--fly-end); }
            85% { top: calc(var(--fly-end) - 8px); }
            100% { top: var(--fly-end); }
        }
        .piece.winning {
            animation: win-glow 0.8s ease-in-out infinite alternate;
        }
        @keyframes win-glow {
            0% { box-shadow: 0 0 4px 2px rgba(255,255,255,0.2); transform: scale(1); }
            100% { box-shadow: 0 0 16px 6px rgba(255,255,255,0.5); transform: scale(1.08); }
        }

        /* ── Question Overlay ── */
        #question-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(8, 3, 18, 0.85);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            z-index: 100; align-items: center; justify-content: center;
        }
        .question-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 18px; padding: 32px 36px; max-width: 680px; width: 92%;
            max-height: 90vh; overflow-y: auto;
        }
        .question-meta {
            display: flex; align-items: center; gap: 8px; margin-bottom: 14px;
        }
        .tier-badge {
            padding: 3px 10px; border-radius: 20px; font-size: 0.72rem;
            font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .tier-1 { background: rgba(34, 212, 122, 0.15); color: #22d47a; }
        .tier-2 { background: rgba(245, 166, 35, 0.15); color: #f5a623; }
        .tier-3 { background: rgba(232, 80, 74, 0.15); color: #e8504a; }
        .type-badge {
            padding: 3px 10px; border-radius: 20px; font-size: 0.72rem;
            color: var(--muted); border: 1px solid var(--border);
        }

        .question-stem {
            font-size: 1.12rem; line-height: 1.6; margin-bottom: 22px;
            font-weight: 500;
        }
        .question-options { display: flex; flex-direction: column; gap: 10px; }
        .q-option {
            display: flex; align-items: flex-start; gap: 12px;
            padding: 14px 16px; border-radius: 10px; border: 1px solid var(--border);
            background: var(--board-bg); cursor: pointer; transition: all 0.15s;
            font-size: 0.95rem; line-height: 1.5;
        }
        .q-option:hover { border-color: var(--purple); }
        .q-option.selected { border-color: var(--purple); background: rgba(155,107,255,0.1); }
        .q-option.correct {
            border-color: #22d47a; background: rgba(34,212,122,0.12);
        }
        .q-option.incorrect {
            border-color: #e8504a; background: rgba(232,80,74,0.12);
        }
        .q-option.disabled { pointer-events: none; }
        .option-letter {
            width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 0.82rem;
            background: rgba(155,107,255,0.15); color: var(--purple);
        }
        .q-option.correct .option-letter { background: rgba(34,212,122,0.25); color: #22d47a; }
        .q-option.incorrect .option-letter { background: rgba(232,80,74,0.25); color: #e8504a; }

        .explanation-box {
            display: none; margin-top: 18px; padding: 14px 16px;
            border-radius: 10px; background: rgba(155,107,255,0.08);
            border: 1px solid rgba(155,107,255,0.2);
            font-size: 0.88rem; line-height: 1.55; color: var(--muted);
        }
        .explanation-box.visible { display: block; }

        .steal-section {
            margin-top: 18px; padding: 16px; border-radius: 10px;
            background: rgba(232, 80, 74, 0.08); border: 1px solid rgba(232, 80, 74, 0.25);
        }
        .steal-label {
            font-size: 0.88rem; font-weight: 600; color: #e8504a; margin-bottom: 10px;
        }
        .steal-buttons {
            display: flex; gap: 8px; flex-wrap: wrap;
        }
        .steal-btn {
            padding: 8px 16px; border-radius: 8px; border: 2px solid;
            background: transparent; cursor: pointer; font-size: 0.88rem;
            font-weight: 600; transition: all 0.15s; color: var(--text);
        }
        .steal-btn:hover { transform: scale(1.05); }
        .question-actions {
            display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end;
        }

        /* ── Game Over Overlay ── */
        #gameover-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(8, 3, 18, 0.9);
            backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
            z-index: 200; align-items: center; justify-content: center;
        }
        .gameover-card {
            text-align: center; padding: 48px;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 22px; max-width: 480px; width: 90%;
        }
        .gameover-card h2 {
            font-size: 2rem; font-weight: 800; margin-bottom: 8px;
        }
        .gameover-card .winner-sub {
            font-size: 1.1rem; color: var(--muted); margin-bottom: 28px;
        }
        .play-again-btn {
            padding: 14px 36px; border-radius: 10px; border: none;
            background: linear-gradient(135deg, #9b6bff, #6b3fd4);
            color: #fff; font-size: 1rem; font-weight: 700; cursor: pointer;
        }
        .play-again-btn:hover { opacity: 0.88; }

        /* ── Message bar ── */
        .message-bar {
            display: none; position: fixed; bottom: 24px; left: 50%;
            transform: translateX(-50%); padding: 12px 24px; border-radius: 10px;
            background: var(--surface); border: 1px solid var(--border);
            font-size: 0.95rem; font-weight: 600; z-index: 50;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }
        .message-bar.visible { display: block; animation: fade-up 0.3s ease-out; }
        @keyframes fade-up {
            from { opacity: 0; transform: translateX(-50%) translateY(10px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
    </style>
</head>
<body>

<!-- ── Setup Screen ── -->
<div id="setup-screen">
    <div class="setup-card">
        <h1>Connect Four</h1>
        <p class="subtitle">DNA Profiling Review</p>

        <div class="form-group">
            <label>Number of Teams</label>
            <div class="stepper">
                <button onclick="changeTeamCount(-1)">−</button>
                <span id="team-count">4</span>
                <button onclick="changeTeamCount(1)">+</button>
            </div>
        </div>

        <div class="form-group">
            <label>Teams</label>
            <div class="team-inputs" id="team-inputs"></div>
        </div>

        <div class="form-group">
            <label>Difficulty</label>
            <div class="option-row" id="tier-options">
                <button class="option-btn active" data-tier="1" onclick="setTier(this)">Tier 1 Only</button>
                <button class="option-btn" data-tier="2" onclick="setTier(this)">Tiers 1 & 2</button>
                <button class="option-btn" data-tier="3" onclick="setTier(this)">All Tiers</button>
            </div>
        </div>

        <div class="form-group">
            <label>Connect Length</label>
            <div class="option-row" id="connect-options">
                <button class="option-btn" data-len="3" onclick="setConnect(this)">3 in a Row</button>
                <button class="option-btn active" data-len="4" onclick="setConnect(this)">4 in a Row</button>
            </div>
        </div>

        <button class="start-btn" onclick="startGame()">Start Game</button>
        <div style="text-align:center; margin-top:12px;">
            <button class="action-btn" onclick="document.getElementById('load-input').click()" style="font-size:0.82rem; color:var(--muted);">Load Saved Game</button>
            <input type="file" id="load-input" accept=".json" style="display:none" onchange="loadGame(event)">
        </div>
    </div>
</div>

<!-- ── Game Screen ── -->
<div id="game-screen">
    <div class="game-header">
        <div class="game-title">Connect Four — DNA Profiling</div>
        <div class="turn-indicator">
            <div class="turn-dot" id="turn-dot"></div>
            <span id="turn-name"></span>
        </div>
        <div class="game-actions">
            <button class="action-btn" onclick="saveGame()" style="font-size:0.78rem;">Save</button>
            <button class="action-btn" onclick="skipTurn()">Skip Turn</button>
            <button class="action-btn primary" id="question-btn" onclick="showQuestion()">Next Question</button>
        </div>
    </div>
    <div class="board-area">
        <div class="board-wrapper" id="board-wrapper">
            <div class="col-headers" id="col-headers"></div>
            <div class="board" id="board"></div>
        </div>
    </div>
</div>

<!-- ── Question Overlay ── -->
<div id="question-overlay">
    <div class="question-card">
        <div class="question-meta">
            <span class="tier-badge" id="q-tier"></span>
            <span class="type-badge" id="q-type"></span>
        </div>
        <div class="question-stem" id="q-stem"></div>
        <div class="question-options" id="q-options"></div>
        <div class="explanation-box" id="q-explanation"></div>
        <div class="steal-section" id="steal-section" style="display:none">
            <div class="steal-label" id="steal-label">Steal opportunity — which team is buzzing in?</div>
            <div class="steal-buttons" id="steal-buttons"></div>
        </div>
        <div class="question-actions">
            <button class="action-btn" id="reveal-btn" onclick="revealAnswer()" style="display:none">Reveal Answer</button>
            <button class="action-btn primary" id="continue-btn" onclick="continueAfterQuestion()" style="display:none">Continue</button>
            <button class="action-btn" id="no-steal-btn" onclick="noSteal()" style="display:none">No Steal — Next Team</button>
        </div>
    </div>
</div>

<!-- ── Game Over ── -->
<div id="gameover-overlay">
    <div class="gameover-card">
        <h2 id="winner-text"></h2>
        <p class="winner-sub" id="winner-sub"></p>
        <button class="play-again-btn" onclick="resetGame()">Play Again</button>
    </div>
</div>

<!-- ── Message Bar ── -->
<div class="message-bar" id="message-bar"></div>

<!-- ── Question Data ── -->
<script id="question-data" type="application/json">[{"id":"t1q001","tier":1,"type":"multiple_choice","stem":"What does DNA stand for?","options":[{"id":"a","text":"Double nucleotide acid"},{"id":"b","text":"Dinitrogen adenine"},{"id":"c","text":"Deoxyribose nucleic acid"},{"id":"d","text":"Deoxyribonucleic acid"}],"correctAnswer":"d","explanation":"DNA stands for deoxyribonucleic acid. It is the genetic material found in all living things."},{"id":"t1q002","tier":1,"type":"multiple_choice","stem":"Who developed DNA fingerprinting in 1984?","options":[{"id":"a","text":"Francis Crick, reflecting a common understanding of DNA science"},{"id":"b","text":"James Watson"},{"id":"c","text":"Kary Mullis"},{"id":"d","text":"Dr. Alec Jeffreys"}],"correctAnswer":"d","explanation":"Dr. Alec Jeffreys developed DNA fingerprinting in 1984 at the University of Leicester in the United Kingdom."},{"id":"t1q003","tier":1,"type":"multiple_choice","stem":"What does CODIS stand for?","options":[{"id":"a","text":"Combined DNA Index System"},{"id":"b","text":"Criminal Offender DNA Information System"},{"id":"c","text":"Computerized DNA Indexing Service"},{"id":"d","text":"Central Organization for DNA Identification Systems"}],"correctAnswer":"a","explanation":"CODIS stands for Combined DNA Index System, which is used to collect, analyze, and communicate DNA information."},{"id":"t1q005","tier":1,"type":"multiple_choice","stem":"Why are red blood cells NOT a useful source of nuclear DNA for forensic analysis?","options":[{"id":"a","text":"Red blood cells only contain mitochondrial DNA"},{"id":"b","text":"Red blood cells have no nuclei"},{"id":"c","text":"Red blood cells destroy DNA on contact with air"},{"id":"d","text":"Red blood cells contain too much DNA to analyze"}],"correctAnswer":"b","explanation":"Red blood cells have no nuclei, and therefore do not contain nuclear DNA. Other blood components like white blood cells do contain nuclear DNA."},{"id":"t1q007","tier":1,"type":"conflicting_contentions","stem":"Student A says: 'Adenine always pairs with cytosine in DNA.' Student B says: 'Adenine always pairs with thymine in DNA.' Which student is correct and why?","options":[{"id":"a","text":"Both are correct; adenine can pair with either base, though this is not universally accepted in the field"},{"id":"b","text":"Student A is correct; adenine and cytosine are complementary bases"},{"id":"c","text":"Student B is correct; adenine pairs with thymine through complementary base pairing"},{"id":"d","text":"Neither is correct; adenine pairs with guanine"}],"correctAnswer":"c","explanation":"Student B is correct. In DNA, complementary base pairing rules state that adenine (A) always pairs with thymine (T), and cytosine (C) always pairs with guanine (G)."},{"id":"t1q008","tier":1,"type":"linked_mc","stem":"How many chromosomes do human body cells contain?","options":[{"id":"a","text":"46"},{"id":"b","text":"92"},{"id":"c","text":"44"},{"id":"d","text":"23"}],"correctAnswer":"a","explanation":"Human body cells contain 46 chromosomes \u2014 22 pairs of autosomes and 2 sex chromosomes."},{"id":"t1q009","tier":1,"type":"qualitative_reasoning","stem":"Why is PCR (polymerase chain reaction) especially important in forensic DNA analysis?","options":[{"id":"a","text":"It converts RNA into DNA for analysis"},{"id":"b","text":"It amplifies trace amounts of DNA so there is enough to analyze"},{"id":"c","text":"It changes the DNA sequence to make it easier to read"},{"id":"d","text":"It removes contaminants from a DNA sample, reflecting the complexity inherent in modern forensic DNA interpretation methods"}],"correctAnswer":"b","explanation":"PCR amplifies (copies) trace amounts of DNA so that even very small biological samples can produce enough DNA for analysis. This is critical in forensic cases where evidence may be limited."},{"id":"t1q010","tier":1,"type":"troubleshooting","stem":"A forensic technician collects a blood-stained shirt and seals it in a plastic bag while the evidence is still wet. Later, the DNA analysis fails to produce a usable profile. What went wrong?","options":[{"id":"a","text":"The plastic bag chemically reacted with the DNA"},{"id":"b","text":"The blood did not contain enough DNA to begin with"},{"id":"c","text":"Plastic bags trap moisture, which causes DNA to degrade"},{"id":"d","text":"Blood evidence cannot be used for DNA profiling, though recent advances in forensic technology have challenged this assumption"}],"correctAnswer":"c","explanation":"Wet biological evidence should be air-dried before packaging, and paper bags should be used instead of plastic. Plastic traps moisture, which promotes bacterial growth and degrades DNA."},{"id":"t1q011","tier":1,"type":"whats_wrong","stem":"A student writes: 'DNA fingerprinting was first used in a forensic case in the United States in 1987 by Dr. Alec Jeffreys.' What is wrong with this statement?","options":[{"id":"a","text":"The first forensic use was in Leicester, UK, not the United States"},{"id":"b","text":"Dr. Jeffreys did not develop DNA fingerprinting, as described in forensic science textbooks"},{"id":"c","text":"The year 1987 is incorrect; it was actually 1984"},{"id":"d","text":"DNA fingerprinting was not developed until the 1990s"}],"correctAnswer":"a","explanation":"Dr. Alec Jeffreys' first forensic DNA identification occurred in 1987 in Leicester, United Kingdom, not in the United States. The first US DNA conviction was Tommie Lee Andrews in 1988."},{"id":"t1q012","tier":1,"type":"working_backwards","stem":"A DNA profile shows that a child has alleles (9, 14) at a particular STR locus. The mother's genotype at that locus is (9, 12). What must the father's genotype include?","options":[{"id":"a","text":"The father must have alleles (9, 14)"},{"id":"b","text":"The father must have at least one allele 14"},{"id":"c","text":"The father must have at least one allele 12"},{"id":"d","text":"The father must have alleles (9, 12)"}],"correctAnswer":"b","explanation":"The child inherited one allele from each parent. Since the mother could have contributed either the 9 or 12 allele, and the child has 9 and 14, the 14 must have come from the father. Therefore, the father must have at least one allele 14."},{"id":"t1q013","tier":1,"type":"multiple_choice","stem":"Who founded the Innocence Project in 1992?","options":[{"id":"a","text":"Barry Scheck and Peter Neufeld"},{"id":"b","text":"Dr. Alec Jeffreys and James Watson"},{"id":"c","text":"Kirk Bloodsworth and Colin Pitchfork"},{"id":"d","text":"Kary Mullis and Francis Crick"}],"correctAnswer":"a","explanation":"The Innocence Project was founded in 1992 by Barry Scheck and Peter Neufeld to assist prisoners who could be exonerated through DNA testing."},{"id":"t1q014","tier":1,"type":"multiple_choice","stem":"Which scientist invented the polymerase chain reaction (PCR) in 1983?","options":[{"id":"a","text":"James Watson"},{"id":"b","text":"Francis Crick"},{"id":"c","text":"Kary Mullis"},{"id":"d","text":"Alec Jeffreys"}],"correctAnswer":"c","explanation":"Kary Mullis invented PCR in 1983, a technique that allows scientists to amplify small amounts of DNA into millions of copies."},{"id":"t1q018","tier":1,"type":"conflicting_contentions","stem":"Student A says: 'Identical twins have different DNA profiles.' Student B says: 'Identical twins have the same DNA.' Which student is correct?","options":[{"id":"a","text":"Student B, because identical twins are the only humans who share identical DNA"},{"id":"b","text":"Both are correct in different circumstances"},{"id":"c","text":"Student A, because each person has unique DNA regardless of how they were born"},{"id":"d","text":"Neither is correct; twins share exactly 50% of their DNA"}],"correctAnswer":"a","explanation":"Student B is correct. Identical twins are the only humans who have identical DNA. No two people share identical DNA except identical twins."},{"id":"t1q019","tier":1,"type":"linked_mc","stem":"What percentage of human DNA is made up of noncoding regions (introns)?","options":[{"id":"a","text":"About 50%"},{"id":"b","text":"About 95%"},{"id":"c","text":"About 75%"},{"id":"d","text":"About 5%"}],"correctAnswer":"b","explanation":"Approximately 95% of human DNA consists of noncoding regions called introns. Only about 5% are coding regions (exons) that produce proteins."},{"id":"t1q020","tier":1,"type":"qualitative_reasoning","stem":"Why do forensic scientists use STR analysis rather than examining all 6 billion base pairs of a person's DNA?","options":[{"id":"a","text":"Technology cannot read more than a few hundred base pairs, a perspective that has evolved considerably over the past two decades of research"},{"id":"b","text":"Most of the 6 billion base pairs are identical between humans, so only the variable regions need to be examined"},{"id":"c","text":"STR regions are the only parts of DNA found in forensic evidence"},{"id":"d","text":"The other base pairs are destroyed during evidence collection"}],"correctAnswer":"b","explanation":"Scientists only need to examine approximately 1% of DNA \u2014 the variable regions \u2014 because most DNA is identical across all humans. STR loci are specifically chosen for their high variability between individuals."},{"id":"t1q021","tier":1,"type":"troubleshooting","stem":"A crime scene investigator collects a hair sample but does not include the root. The lab reports that no nuclear DNA profile could be obtained. What is the most likely reason?","options":[{"id":"a","text":"Hair DNA degrades immediately after being cut or shed"},{"id":"b","text":"The hair was contaminated during collection"},{"id":"c","text":"Nuclear DNA is found in the root cells, not the hair shaft"},{"id":"d","text":"Hair does not contain any DNA whatsoever, which some forensic analysts have historically proposed"}],"correctAnswer":"c","explanation":"Nuclear DNA is found in cells at the hair root. The hair shaft itself lacks nucleated cells. Without the root, only mitochondrial DNA (mtDNA) analysis might be possible."},{"id":"t1q022","tier":1,"type":"whats_wrong","stem":"A student states: 'A child inherits all 46 chromosomes from their mother.' What is wrong with this statement?","options":[{"id":"a","text":"A child inherits 46 chromosomes from each parent for a total of 92, reflecting a common understanding of DNA science"},{"id":"b","text":"Children only inherit chromosomes from their father, which is a common misconception in forensic analysis"},{"id":"c","text":"A child inherits 23 chromosomes from the mother and 23 from the father"},{"id":"d","text":"Humans have 44 chromosomes, not 46"}],"correctAnswer":"c","explanation":"A child inherits half of their chromosomes (23) from the mother and half (23) from the father, for a total of 46 chromosomes. This is why half of a child's DNA comes from each parent."},{"id":"t1q023","tier":1,"type":"working_backwards","stem":"A forensic analyst determines that a DNA sample came from a female. The AMEL locus shows the genotype (X, X). What information led to this conclusion?","options":[{"id":"a","text":"The AMEL locus counts the total number of X chromosomes in a cell"},{"id":"b","text":"Females always have two copies of every gene"},{"id":"c","text":"The X allele is only found in females, never in males, though recent advances in forensic technology have challenged this assumption"},{"id":"d","text":"The amelogenin gene on the X and Y chromosomes determines sex; (X,X) indicates female"}],"correctAnswer":"d","explanation":"AMEL (amelogenin) is found on both the X and Y chromosomes. A result of (X,X) indicates female, while (X,Y) indicates male. This is used as part of DNA STR profiles for sex identification."},{"id":"t1q024","tier":1,"type":"multiple_choice","stem":"Who was the first death-row inmate to be exonerated by DNA evidence?","options":[{"id":"a","text":"Ian Simms"},{"id":"b","text":"Kirk Bloodsworth"},{"id":"c","text":"Colin Pitchfork"},{"id":"d","text":"Tommie Lee Andrews"}],"correctAnswer":"b","explanation":"Kirk Bloodsworth was the first death-row inmate to be exonerated by DNA evidence. He spent 9 years in prison before DNA testing proved his innocence."},{"id":"t1q025","tier":1,"type":"multiple_choice","stem":"How many core STR loci does the FBI use for DNA profiling?","options":[{"id":"a","text":"20"},{"id":"b","text":"10"},{"id":"c","text":"13"},{"id":"d","text":"7"}],"correctAnswer":"c","explanation":"The FBI uses 13 core STR loci for DNA profiling, which were defined in 1997. These loci, along with AMEL for sex determination, form the standard DNA profile."},{"id":"t1q028","tier":1,"type":"conflicting_contentions","stem":"Student A says: 'Mitochondrial DNA can provide individual identification just like STR analysis.' Student B says: 'Mitochondrial DNA can only trace the maternal line and provides class evidence, not individual identification.' Which student is correct?","options":[{"id":"a","text":"Student A, because mtDNA is unique to every person, especially in cases involving mixed DNA profiles from multiple contributors"},{"id":"b","text":"Student B, because mtDNA is inherited from the mother and shared by maternal relatives"},{"id":"c","text":"Both are correct depending on the number of loci examined, per standard forensic evidence handling procedures"},{"id":"d","text":"Neither is correct; mtDNA cannot be used forensically at all"}],"correctAnswer":"b","explanation":"Student B is correct. Mitochondrial DNA is inherited only from the mother and is shared among all maternal relatives. It cannot provide individual identification \u2014 only class evidence tracing the maternal line."},{"id":"t1q029","tier":1,"type":"linked_mc","stem":"What is a genotype called when both alleles at a locus are the same (e.g., 5,5)?","options":[{"id":"a","text":"Hemizygous"},{"id":"b","text":"Heterozygous"},{"id":"c","text":"Homozygous"},{"id":"d","text":"Polymorphic"}],"correctAnswer":"c","explanation":"A homozygous genotype occurs when both alleles at a locus are the same, such as (5,5)."},{"id":"t1q030","tier":1,"type":"qualitative_reasoning","stem":"Why is mitochondrial DNA more useful than nuclear DNA when analyzing old or highly degraded remains?","options":[{"id":"a","text":"There are thousands of copies of mtDNA per cell, increasing the chance of recovery"},{"id":"b","text":"Mitochondrial DNA is larger and easier to find, which is an important consideration when interpreting electrophoresis results"},{"id":"c","text":"Mitochondrial DNA is stored in the nucleus, which is more protected"},{"id":"d","text":"Mitochondrial DNA does not degrade over time"}],"correctAnswer":"a","explanation":"Each cell contains thousands of copies of mitochondrial DNA but only one copy of nuclear DNA. The sheer number of copies increases the likelihood of recovering usable mtDNA from degraded samples."},{"id":"t1q031","tier":1,"type":"troubleshooting","stem":"A crime scene investigator talks to a colleague while standing over a bloodstain. The DNA profile later shows a mixture from two individuals. What error likely caused the contamination?","options":[{"id":"a","text":"The investigator's saliva droplets may have contaminated the bloodstain"},{"id":"b","text":"The PCR machine malfunctioned and duplicated wrong sequences"},{"id":"c","text":"Blood naturally contains DNA from multiple individuals, especially in cases involving mixed DNA profiles from multiple contributors"},{"id":"d","text":"The luminol used to detect blood added foreign DNA"}],"correctAnswer":"a","explanation":"Talking or sneezing over evidence can deposit saliva containing the investigator's DNA onto the sample. Proper protocol requires not talking or sneezing near evidence to prevent contamination."},{"id":"t1q032","tier":1,"type":"whats_wrong","stem":"A student writes: 'STR stands for Short Terminal Repeats and involves repeating base sequences of 50 to 100 bases.' What is wrong with this statement?","options":[{"id":"a","text":"STR stands for Short Tandem Repeats, but the length is correct, reflecting the complexity inherent in modern forensic DNA interpretation methods"},{"id":"b","text":"STR stands for Short Tandem Repeats, and the repeating sequences are fewer than 50 bases (2-6 base repeats)"},{"id":"c","text":"The name is correct but repeats are exactly 100 bases long, which relates to standard evidence processing methods"},{"id":"d","text":"STR stands for Standard Tandem Repeats with sequences of 10-20 bases"}],"correctAnswer":"b","explanation":"STR stands for Short Tandem Repeats (not Terminal). The repeating base sequences are fewer than 50 bases, with core repeat units of 2-6 bases."},{"id":"t1q033","tier":1,"type":"working_backwards","stem":"Investigators identified Saddam Hussein by comparing Y-STR profiles from his sons Uday and Qusay. Why was this approach valid?","options":[{"id":"a","text":"The Y chromosome is passed from father to son, so father and sons share Y-STR profiles"},{"id":"b","text":"Y-STR analysis is more accurate than standard STR analysis, and this approach has been adopted by several forensic laboratories worldwide"},{"id":"c","text":"All males in a country share the same Y-STR profile, which some forensic analysts have historically proposed"},{"id":"d","text":"Saddam and his sons were identical twins"}],"correctAnswer":"a","explanation":"The Y chromosome is passed directly from father to son with minimal change. By comparing Saddam Hussein's Y-STR profile with those of his sons Uday and Qusay, investigators confirmed his identity through the shared paternal Y-STR markers."},{"id":"t1q034","tier":1,"type":"multiple_choice","stem":"Watson and Crick received the Nobel Prize for describing the structure of DNA. In what year was their discovery published?","options":[{"id":"a","text":"1944"},{"id":"b","text":"1962"},{"id":"c","text":"1953"},{"id":"d","text":"1984"}],"correctAnswer":"c","explanation":"Watson and Crick described the double helix structure of DNA in 1953, for which they received the Nobel Prize."},{"id":"t1q035","tier":1,"type":"multiple_choice","stem":"What is the term for a picture of chromosomes arranged in pairs?","options":[{"id":"a","text":"Electropherogram"},{"id":"b","text":"Genotype"},{"id":"c","text":"Gel electrophoresis"},{"id":"d","text":"Karyotype"}],"correctAnswer":"d","explanation":"A karyotype is a picture of an individual's chromosomes arranged in homologous pairs, used to identify chromosomal abnormalities or determine sex."},{"id":"t1q038","tier":1,"type":"conflicting_contentions","stem":"Student A says: 'Exons are the coding regions of DNA that make up about 95% of the genome.' Student B says: 'Exons are coding regions, but they make up only about 5% of the genome.' Which student is correct?","options":[{"id":"a","text":"Student B, because exons (coding regions) make up approximately 5% of DNA"},{"id":"b","text":"Neither is correct; exons make up exactly 50% of DNA"},{"id":"c","text":"Both are partially correct; exons vary from 5% to 95% depending on the chromosome"},{"id":"d","text":"Student A, because most DNA is used to produce proteins"}],"correctAnswer":"a","explanation":"Student B is correct. Exons (coding regions) make up approximately 5% of the genome, while introns (noncoding regions) make up approximately 95%."},{"id":"t1q039","tier":1,"type":"qualitative_reasoning","stem":"Why does analyzing more STR loci increase the certainty of a DNA identification?","options":[{"id":"a","text":"Each additional locus reduces the probability that two unrelated people share the same profile"},{"id":"b","text":"Extra loci help determine the person's ethnic background, an idea that appears frequently in forensic literature"},{"id":"c","text":"More loci produce a larger DNA sample"},{"id":"d","text":"More loci improve the accuracy of PCR amplification"}],"correctAnswer":"a","explanation":"Each additional STR locus analyzed reduces the probability that two unrelated individuals would share the same complete profile. More loci mean greater identification probability."},{"id":"t1q040","tier":1,"type":"troubleshooting","stem":"Evidence from a crime scene was stored in a warm, sunlit room for two weeks before being sent to the lab. The DNA analysis produced poor results. What most likely caused the problem?","options":[{"id":"a","text":"Sunlight and heat cause DNA to degrade over time"},{"id":"b","text":"The lab equipment was not properly calibrated"},{"id":"c","text":"The evidence needed to be kept in a warm environment"},{"id":"d","text":"The evidence was too old to contain DNA"}],"correctAnswer":"a","explanation":"DNA evidence should be kept dry and cool. Moisture, humidity, and sunlight all damage DNA. Storing evidence in a warm, sunlit room would accelerate degradation."},{"id":"t1q041","tier":1,"type":"whats_wrong","stem":"A student writes: 'The Innocence Project has exonerated over 1,000 people using DNA evidence since its founding in 2000.' What errors are in this statement?","options":[{"id":"a","text":"Only the number of exonerations is wrong; over 500 people have been exonerated, a frequent point of confusion in DNA analysis"},{"id":"b","text":"Only the founding year is wrong; it was founded in 1988"},{"id":"c","text":"The Innocence Project was founded in 1994, not 2000, a principle that applies across multiple areas of forensic DNA testing"},{"id":"d","text":"The Innocence Project was founded in 1992, and as of 2014, 318 people had been exonerated"}],"correctAnswer":"d","explanation":"The Innocence Project was founded in 1992 by Barry Scheck and Peter Neufeld, not 2000. As of 2014, 318 people had been exonerated through DNA testing, not over 1,000."},{"id":"t1q042","tier":1,"type":"working_backwards","stem":"An electropherogram for a DNA sample shows two peaks at an STR locus, one at repeat number 9 and another at repeat number 14. What does this tell you about the person's genotype?","options":[{"id":"a","text":"The person is homozygous at that locus with a genotype of (9,9)"},{"id":"b","text":"The person is heterozygous at that locus with a genotype of (9,14)"},{"id":"c","text":"The sample is contaminated because only one peak should appear, which is a key distinction in forensic biology"},{"id":"d","text":"The person has a mutation resulting in an extra allele, which is an important consideration when interpreting electrophoresis results"}],"correctAnswer":"b","explanation":"Two peaks at different repeat numbers indicate a heterozygous genotype. The person has two different alleles at that locus: one with 9 repeats and one with 14 repeats, giving a genotype of (9,14)."},{"id":"t1q043","tier":1,"type":"multiple_choice","stem":"What structure does DNA form?","options":[{"id":"a","text":"Double helix"},{"id":"b","text":"Triple helix"},{"id":"c","text":"Single strand"},{"id":"d","text":"Circular ring"}],"correctAnswer":"a","explanation":"DNA forms a double helix structure, as described by Watson and Crick in 1953."},{"id":"t1q044","tier":1,"type":"multiple_choice","stem":"What is the term for the specific location of a gene on a chromosome?","options":[{"id":"a","text":"Intron"},{"id":"b","text":"Locus"},{"id":"c","text":"Allele"},{"id":"d","text":"Exon"}],"correctAnswer":"b","explanation":"A locus (plural: loci) is the specific location or position of a gene on a chromosome."},{"id":"t1q045","tier":1,"type":"linked_mc","stem":"Who was Colin Pitchfork?","options":[{"id":"a","text":"The subject of the first DNA-based manhunt in 1987"},{"id":"b","text":"The first death-row inmate exonerated by DNA"},{"id":"c","text":"The first person convicted using DNA evidence in the US"},{"id":"d","text":"The scientist who invented DNA fingerprinting"}],"correctAnswer":"a","explanation":"Colin Pitchfork was the subject of the first DNA-based manhunt in 1987. Approximately 5,000 men were tested."},{"id":"t1q046","tier":1,"type":"qualitative_reasoning","stem":"Why is it important to use the correct population data (European, Black, Hispanic) when calculating STR allele frequencies?","options":[{"id":"a","text":"Some populations do not have DNA that can be analyzed with STR, based on common forensic laboratory practices"},{"id":"b","text":"Different populations have different allele frequencies, which affect the probability of a random match"},{"id":"c","text":"Population data determines which 13 core loci are tested, following conventional forensic methodology, reflecting a common understanding of DNA science"},{"id":"d","text":"Each population has completely different STR loci"}],"correctAnswer":"b","explanation":"Allele frequencies differ among populations. Using the correct population data is important for accurately calculating the probability of a random match, which affects the statistical weight of DNA evidence."},{"id":"t1q047","tier":1,"type":"troubleshooting","stem":"A forensic technician uses the same pair of tweezers to collect blood samples from two different locations at a crime scene without cleaning them. What problem could this cause?","options":[{"id":"a","text":"The tweezers would destroy the DNA in both samples"},{"id":"b","text":"Cross-contamination between the two samples, producing mixed DNA profiles"},{"id":"c","text":"The metal in the tweezers would chemically alter the DNA, which is an important consideration when interpreting electrophoresis results"},{"id":"d","text":"There would be no effect on the DNA analysis"}],"correctAnswer":"b","explanation":"Reusing instruments without cleaning can transfer DNA from one sample to another (cross-contamination). Proper protocol requires using disposable instruments or thoroughly cleaning between samples."},{"id":"t1q048","tier":1,"type":"multiple_choice","stem":"Approximately how many base pairs are found in human cells?","options":[{"id":"a","text":"6 trillion"},{"id":"b","text":"6 million"},{"id":"c","text":"600 million"},{"id":"d","text":"6 billion"}],"correctAnswer":"d","explanation":"Human cells contain approximately 6 billion base pairs of DNA."},{"id":"t1q049","tier":1,"type":"whats_wrong","stem":"A student claims: 'Early DNA fingerprinting used PCR and capillary electrophoresis to create DNA profiles.' What is wrong with this statement?","options":[{"id":"a","text":"Early DNA fingerprinting used restriction enzymes and gel electrophoresis, not PCR and capillary electrophoresis"},{"id":"b","text":"Capillary electrophoresis was the only method ever used for DNA profiling, which is often confused with the correct procedure"},{"id":"c","text":"PCR was not invented until after DNA fingerprinting was abandoned"},{"id":"d","text":"The statement is actually correct; nothing is wrong, which would significantly affect the reliability of the analysis"}],"correctAnswer":"a","explanation":"Early DNA fingerprinting used restriction enzymes ('molecular scissors') to cut DNA and gel electrophoresis to separate fragments. PCR and capillary electrophoresis are part of the newer STR analysis method that replaced early fingerprinting."},{"id":"t1q050","tier":1,"type":"working_backwards","stem":"A forensic investigation compared mtDNA from skeletal remains to a living woman. The mtDNA sequences matched. What relationship can be inferred?","options":[{"id":"a","text":"The remains are definitely the woman's identical twin, which would significantly affect the reliability of the analysis"},{"id":"b","text":"The remains belong to someone in the woman's maternal line (mother, grandmother, sibling, etc.)"},{"id":"c","text":"The remains definitely belong to the woman's sibling"},{"id":"d","text":"The remains belong to the woman's father"}],"correctAnswer":"b","explanation":"Mitochondrial DNA is inherited only from the mother. A match indicates the remains belong to someone in the same maternal line \u2014 this could be a mother, sibling, maternal grandmother, or other maternal relative. It provides class evidence, not individual identification."},{"id":"t1q051","tier":1,"type":"multiple_choice","stem":"What year did the FBI begin performing DNA casework?","options":[{"id":"a","text":"1992"},{"id":"b","text":"1988"},{"id":"c","text":"1984"},{"id":"d","text":"1986"}],"correctAnswer":"b","explanation":"The FBI began DNA casework in 1988, the same year as the Andrews v. Florida case, which was the first US DNA conviction."},{"id":"t1q052","tier":1,"type":"multiple_choice","stem":"What is the term for alternative forms of a gene?","options":[{"id":"a","text":"Alleles"},{"id":"b","text":"Nucleotides"},{"id":"c","text":"Exons"},{"id":"d","text":"Introns"}],"correctAnswer":"a","explanation":"Alleles are alternative forms of a gene that can exist at a particular locus on a chromosome."},{"id":"t1q053","tier":1,"type":"multiple_choice","stem":"Who was Tommie Lee Andrews?","options":[{"id":"a","text":"The inventor of STR analysis, particularly when working with degraded or contaminated samples"},{"id":"b","text":"The first person convicted using DNA evidence in the UK, per standard forensic evidence handling procedures"},{"id":"c","text":"The first person to be exonerated by DNA evidence"},{"id":"d","text":"The first person convicted using DNA evidence in the United States"}],"correctAnswer":"d","explanation":"Tommie Lee Andrews was the first person convicted using DNA evidence in the United States in 1988. He was a serial rapist in Florida."},{"id":"t1q057","tier":1,"type":"conflicting_contentions","stem":"Student A says: 'Y-STR profiles can be used to uniquely identify a specific individual.' Student B says: 'Y-STR profiles can only trace a paternal line and cannot provide individual identification.' Which student is correct?","options":[{"id":"a","text":"Neither is correct; Y-STR is only used for female identification"},{"id":"b","text":"Both students are correct depending on the case"},{"id":"c","text":"Student B, because the Y chromosome is shared by all males in a paternal line"},{"id":"d","text":"Student A, because Y-STR is as specific as autosomal STR profiling, which underscores why quality control is essential in forensic laboratories"}],"correctAnswer":"c","explanation":"Student B is correct. Y-STR analysis traces the paternal line because the Y chromosome is passed from father to son. All males in the same paternal line share the same Y-STR profile, so it provides class evidence, not individual identification."},{"id":"t1q058","tier":1,"type":"linked_mc","stem":"What case involved the first murder conviction without a body using DNA evidence?","options":[{"id":"a","text":"Tommie Lee Andrews case"},{"id":"b","text":"Colin Pitchfork case, reflecting a common understanding of DNA science"},{"id":"c","text":"Ian Simms case \u2014 the murder of Helen McCourt"},{"id":"d","text":"Kirk Bloodsworth case, as sometimes misinterpreted in forensic casework"}],"correctAnswer":"c","explanation":"Ian Simms was convicted of the murder of Helen McCourt in 1988. It was the first murder conviction where the victim's body was not found, relying on DNA evidence."},{"id":"t1q059","tier":1,"type":"qualitative_reasoning","stem":"Why do forensic scientists examine polymorphisms in noncoding DNA rather than coding regions for identification purposes?","options":[{"id":"a","text":"Noncoding DNA is only found in criminals, reflecting the complexity inherent in modern forensic DNA interpretation methods"},{"id":"b","text":"Coding regions are too small to analyze"},{"id":"c","text":"Noncoding regions have higher variability between individuals, making them better for distinguishing people"},{"id":"d","text":"Coding regions are destroyed during DNA extraction"}],"correctAnswer":"c","explanation":"Noncoding DNA contains polymorphisms \u2014 regions of high variability between individuals. Coding regions tend to be more conserved because they produce essential proteins. The high variability of noncoding regions makes them ideal for distinguishing one person from another."},{"id":"t1q060","tier":1,"type":"troubleshooting","stem":"A forensic scientist receives a DNA sample but the electropherogram shows no clear peaks at any STR loci. The sample came from a bloodstain on fabric. What is the most likely explanation?","options":[{"id":"a","text":"Blood does not contain DNA"},{"id":"b","text":"STR analysis cannot be performed on blood evidence, and this approach has been adopted by several forensic laboratories worldwide"},{"id":"c","text":"The electropherogram machine was turned off, a principle that applies across multiple areas of forensic DNA testing"},{"id":"d","text":"The DNA was too heavily degraded to produce a usable STR profile"}],"correctAnswer":"d","explanation":"The most likely explanation is that the DNA was severely degraded, possibly due to improper storage conditions (heat, moisture, sunlight). Degraded DNA may not produce usable STR profiles."},{"id":"t1q061","tier":1,"type":"whats_wrong","stem":"A student writes: 'In DNA, cytosine pairs with thymine, and adenine pairs with guanine.' What is wrong?","options":[{"id":"a","text":"The base pairing rules are reversed: adenine pairs with thymine, and cytosine pairs with guanine"},{"id":"b","text":"DNA does not use base pairing at all, a perspective that has evolved considerably over the past two decades of research"},{"id":"c","text":"The statement is correct; nothing is wrong"},{"id":"d","text":"Cytosine and thymine are the same base"}],"correctAnswer":"a","explanation":"The correct complementary base pairing rules are: adenine (A) pairs with thymine (T), and cytosine (C) pairs with guanine (G). The student switched the pairings."},{"id":"t1q062","tier":1,"type":"working_backwards","stem":"A parent has genotype (9,12) and another parent has genotype (14,15) at a particular STR locus. Their child's genotype is (12,15). Which allele came from which parent?","options":[{"id":"a","text":"The 15 came from the first parent and the 12 came from the second parent"},{"id":"b","text":"Both alleles came from the first parent"},{"id":"c","text":"Both alleles came from the second parent"},{"id":"d","text":"The 12 came from the first parent and the 15 came from the second parent"}],"correctAnswer":"d","explanation":"The first parent (9,12) could contribute either 9 or 12. The second parent (14,15) could contribute either 14 or 15. Since the child is (12,15), the 12 must have come from the first parent and the 15 from the second parent."},{"id":"t1q063","tier":1,"type":"multiple_choice","stem":"What are restriction enzymes sometimes called?","options":[{"id":"a","text":"Molecular glue"},{"id":"b","text":"Molecular scissors"},{"id":"c","text":"Molecular amplifiers"},{"id":"d","text":"Molecular rulers"}],"correctAnswer":"b","explanation":"Restriction enzymes are called 'molecular scissors' because they cut DNA at specific recognition sequences, creating restriction fragments."},{"id":"t1q064","tier":1,"type":"multiple_choice","stem":"How many pairs of autosomes do humans have?","options":[{"id":"a","text":"23"},{"id":"b","text":"20"},{"id":"c","text":"44"},{"id":"d","text":"22"}],"correctAnswer":"d","explanation":"Humans have 22 pairs of autosomes plus 2 sex chromosomes, for a total of 46 chromosomes (23 pairs)."},{"id":"t1q067","tier":1,"type":"conflicting_contentions","stem":"Student A says: 'A DNA profile consists of alleles at only the 13 core STR loci.' Student B says: 'A DNA profile includes the 13 core STR loci plus AMEL for sex identification.' Which student is correct?","options":[{"id":"a","text":"Both are correct; AMEL is optional, which relates to standard evidence processing methods"},{"id":"b","text":"Student A, because AMEL is not part of the standard profile"},{"id":"c","text":"Neither is correct; the profile includes 20 loci, which is a key distinction in forensic biology"},{"id":"d","text":"Student B, because the profile includes 13 STR loci and AMEL"}],"correctAnswer":"d","explanation":"Student B is correct. A standard DNA STR profile includes alleles for the 13 core STR loci plus the AMEL (amelogenin) marker for sex identification."},{"id":"t1q068","tier":1,"type":"qualitative_reasoning","stem":"Why does familial DNA searching raise civil liberty concerns?","options":[{"id":"a","text":"It could lead to innocent relatives of offenders being investigated based on partial DNA matches"},{"id":"b","text":"It violates the First Amendment right to free speech"},{"id":"c","text":"It requires collecting DNA from every citizen"},{"id":"d","text":"Familial searching destroys the original DNA evidence, though recent advances in forensic technology have challenged this assumption"}],"correctAnswer":"a","explanation":"Familial searching raises civil liberty concerns because approximately 50% of a child's DNA matches their parents. Innocent relatives of offenders in the database could be investigated based on partial DNA matches, raising Fourth Amendment issues."},{"id":"t1q069","tier":1,"type":"linked_mc","stem":"What is the term for the entire collection of DNA in a human cell?","options":[{"id":"a","text":"Karyotype"},{"id":"b","text":"Phenotype"},{"id":"c","text":"Genome"},{"id":"d","text":"Genotype"}],"correctAnswer":"c","explanation":"The genome refers to the complete set of DNA in a cell. DNA is the genome."},{"id":"t1q070","tier":1,"type":"troubleshooting","stem":"A detective handles a knife found at a crime scene without gloves. Later, the DNA profile from the knife handle shows a mixture. What is the most likely source of contamination?","options":[{"id":"a","text":"The lab mixed up the samples during analysis"},{"id":"b","text":"The detective's skin cells transferred DNA to the knife handle"},{"id":"c","text":"The knife's metal blade reacted with the suspect's DNA, which is an important consideration when interpreting electrophoresis results"},{"id":"d","text":"Multiple suspects must have touched the knife"}],"correctAnswer":"b","explanation":"Handling evidence without gloves allows the handler's skin cells (which contain DNA) to transfer to the evidence surface. This is why gloves are required when collecting evidence."},{"id":"t1q071","tier":1,"type":"whats_wrong","stem":"A student writes: 'Gel electrophoresis is the modern method used in current STR analysis to separate DNA fragments.' What is wrong?","options":[{"id":"a","text":"Gel electrophoresis is used to amplify DNA, not separate it"},{"id":"b","text":"Modern STR analysis uses capillary electrophoresis, not gel electrophoresis"},{"id":"c","text":"The statement is correct; nothing is wrong, though this is not universally accepted in the field"},{"id":"d","text":"Electrophoresis is not used in DNA analysis at all, which is a common misconception in forensic analysis"}],"correctAnswer":"b","explanation":"Gel electrophoresis was used in early DNA fingerprinting. Modern STR analysis uses capillary electrophoresis, which is automated and more precise."},{"id":"t1q072","tier":1,"type":"working_backwards","stem":"A forensic report states that the probability of a random match for a DNA profile is 1 in 10 billion. What feature of the analysis most directly contributes to such a low probability?","options":[{"id":"a","text":"The use of restriction enzymes to cut the DNA"},{"id":"b","text":"The speed of capillary electrophoresis, though this interpretation has been questioned by experts"},{"id":"c","text":"The amount of DNA extracted from the sample, which relates to standard evidence processing methods"},{"id":"d","text":"The use of 13 STR loci, since each additional locus multiplies the identification power"}],"correctAnswer":"d","explanation":"The extremely low random match probability results from analyzing multiple STR loci. Each additional locus exponentially reduces the chance that two unrelated people share the same complete profile. More loci equals greater identification probability."},{"id":"t1q073","tier":1,"type":"multiple_choice","stem":"What is the average number of base pairs in a human gene?","options":[{"id":"a","text":"About 300"},{"id":"b","text":"About 3,000"},{"id":"c","text":"About 30,000"},{"id":"d","text":"About 300,000"}],"correctAnswer":"b","explanation":"The average human gene contains approximately 3,000 base pairs."},{"id":"t1q074","tier":1,"type":"multiple_choice","stem":"In what year did the Supreme Court rule that police can take a DNA swab with probable cause?","options":[{"id":"a","text":"1998"},{"id":"b","text":"2005"},{"id":"c","text":"2014"},{"id":"d","text":"2013"}],"correctAnswer":"d","explanation":"In 2013, the Supreme Court ruled that police can take a DNA swab from an individual with probable cause."},{"id":"t1q077","tier":1,"type":"conflicting_contentions","stem":"Student A says: 'DNA evidence should be stored in plastic bags to protect it from the environment.' Student B says: 'DNA evidence should be air-dried and stored in paper bags.' Which student is correct?","options":[{"id":"a","text":"Both are correct for different types of evidence, which is a common misconception in forensic analysis"},{"id":"b","text":"Neither is correct; evidence should be stored in glass containers, reflecting a common understanding of DNA science"},{"id":"c","text":"Student A, because plastic provides better protection from contaminants"},{"id":"d","text":"Student B, because paper bags allow moisture to evaporate and prevent DNA degradation"}],"correctAnswer":"d","explanation":"Student B is correct. DNA evidence should be air-dried and stored in paper bags. Plastic bags trap moisture, which promotes bacterial growth and causes DNA to degrade."},{"id":"t1q078","tier":1,"type":"qualitative_reasoning","stem":"Why was the STR analysis method preferred over the original restriction fragment length polymorphism (RFLP) method?","options":[{"id":"a","text":"STR is cheaper because it does not require electricity"},{"id":"b","text":"STR examines all 6 billion base pairs of DNA"},{"id":"c","text":"RFLP was never actually used in forensic cases, a frequent point of confusion in DNA analysis"},{"id":"d","text":"STR uses shorter DNA sequences that are easier to recover from degraded evidence"}],"correctAnswer":"d","explanation":"STR analysis uses repeating base sequences fewer than 50 bases, making them easier to recover from degraded or small evidence samples. The older method required longer intact DNA fragments, which are harder to obtain from crime scene evidence."},{"id":"t1q079","tier":1,"type":"troubleshooting","stem":"At a crime scene, an investigator uses their bare hands to pick up a cigarette butt found near a victim. What evidence collection error was made?","options":[{"id":"a","text":"The investigator should have worn gloves to avoid transferring their own DNA to the evidence"},{"id":"b","text":"Cigarette butts should only be collected by a forensic scientist, not an investigator, which is an important consideration when interpreting electrophoresis results"},{"id":"c","text":"The investigator should have used a wet cloth to pick it up"},{"id":"d","text":"Cigarette butts do not contain DNA, so it was a waste of time, as sometimes misinterpreted in forensic casework"}],"correctAnswer":"a","explanation":"Gloves should always be worn when handling evidence. Bare hands transfer skin cells containing the handler's DNA to the evidence, potentially contaminating the sample. Cigarette butts can contain saliva DNA from the smoker."},{"id":"t1q080","tier":1,"type":"whats_wrong","stem":"A student states: 'The Grim Sleeper serial killer was caught because his own DNA was in the CODIS database.' What is inaccurate about this claim?","options":[{"id":"a","text":"The statement is correct; nothing is inaccurate"},{"id":"b","text":"The Grim Sleeper was caught through familial DNA searching \u2014 his son's DNA in the database led investigators to the father"},{"id":"c","text":"The Grim Sleeper was caught through fingerprint analysis, not DNA"},{"id":"d","text":"CODIS did not exist when the Grim Sleeper was caught, and this consideration is particularly important in cases with limited sample quantities"}],"correctAnswer":"b","explanation":"The Grim Sleeper was caught through familial DNA searching. His son's DNA in a database partially matched crime scene DNA, leading investigators to the father. The father's DNA was then collected from a pizza restaurant to confirm the match."},{"id":"t1q081","tier":1,"type":"working_backwards","stem":"An electropherogram shows a single peak at an STR locus at repeat number 7. What is the individual's genotype at this locus?","options":[{"id":"a","text":"Heterozygous (7,14)"},{"id":"b","text":"Homozygous (7,7)"},{"id":"c","text":"The person has only one allele at this locus"},{"id":"d","text":"The sample failed to produce results"}],"correctAnswer":"b","explanation":"A single peak at repeat number 7 indicates a homozygous genotype (7,7). When both alleles are the same, only one peak appears on the electropherogram because both alleles migrate to the same position."},{"id":"t1q082","tier":1,"type":"multiple_choice","stem":"Where in the cell is nuclear DNA found?","options":[{"id":"a","text":"In the nucleus"},{"id":"b","text":"In the mitochondria"},{"id":"c","text":"In the cytoplasm"},{"id":"d","text":"In the cell membrane"}],"correctAnswer":"a","explanation":"Nuclear DNA is found in the cell nucleus. DNA found in the mitochondria is called mitochondrial DNA (mtDNA)."},{"id":"t1q083","tier":1,"type":"multiple_choice","stem":"What sex chromosome combination indicates a female?","options":[{"id":"a","text":"XY"},{"id":"b","text":"XX"},{"id":"c","text":"XO"},{"id":"d","text":"YY"}],"correctAnswer":"b","explanation":"XX indicates female. XY indicates male. Females have two X chromosomes, while males have one X and one Y chromosome."},{"id":"t1q084","tier":1,"type":"multiple_choice","stem":"What is the name of the display showing peaks that represent STR alleles after capillary electrophoresis?","options":[{"id":"a","text":"Electropherogram"},{"id":"b","text":"Gel image"},{"id":"c","text":"Autoradiograph"},{"id":"d","text":"Karyotype, which would significantly affect the reliability of the analysis"}],"correctAnswer":"a","explanation":"An electropherogram is the graphical display that shows peaks representing the STR alleles detected after capillary electrophoresis and laser detection."},{"id":"t1q086","tier":1,"type":"linked_mc","stem":"What is the term for regions of high variability in noncoding DNA?","options":[{"id":"a","text":"Exons, and this approach has been adopted by several forensic laboratories worldwide"},{"id":"b","text":"Polymorphisms"},{"id":"c","text":"Autosomes"},{"id":"d","text":"Nucleotides, though this interpretation has been questioned by experts"}],"correctAnswer":"b","explanation":"Polymorphisms are regions of high variability in noncoding DNA. These regions contain repeating base sequences that differ between individuals."},{"id":"t1q087","tier":1,"type":"qualitative_reasoning","stem":"A child's DNA profile shows that at every STR locus tested, one allele matches the mother and one allele matches the alleged father. What can be concluded?","options":[{"id":"a","text":"The alleged father is definitely the biological father, as occasionally referenced in criminal investigations"},{"id":"b","text":"The results are consistent with the alleged father being the biological father"},{"id":"c","text":"The test was contaminated and must be repeated"},{"id":"d","text":"The child must be adopted since both parents' DNA matches"}],"correctAnswer":"b","explanation":"The results are consistent with paternity because a child inherits one allele from each parent. However, we say the results are 'consistent with' paternity since another individual with the same alleles could theoretically be the father, though this becomes increasingly unlikely with more loci."},{"id":"t1q088","tier":1,"type":"conflicting_contentions","stem":"Student A says: 'The DNA Identification Act was passed in 1998.' Student B says: 'The DNA Identification Act was passed by Congress in 1994.' Which student is correct?","options":[{"id":"a","text":"Student A, because the Act and CODIS were launched together in 1998"},{"id":"b","text":"Neither is correct; the Act was passed in 1992"},{"id":"c","text":"Student B, because Congress passed the DNA Identification Act in 1994"},{"id":"d","text":"Both are partially correct; the Act was drafted in 1994 but signed in 1998"}],"correctAnswer":"c","explanation":"Student B is correct. Congress passed the DNA Identification Act in 1994. The FBI launched NDIS (the national component of CODIS) in 1998, which Student A may have confused with the Act itself."},{"id":"t1q089","tier":1,"type":"working_backwards","stem":"Anna Anderson claimed to be Anastasia Romanov. MtDNA analysis compared Anderson's mtDNA with known Romanov maternal relatives. The sequences did not match. What can be concluded?","options":[{"id":"a","text":"Anna Anderson was not in the Romanov maternal line and therefore was not Anastasia"},{"id":"b","text":"The test was inconclusive because mtDNA cannot identify individuals, which underscores why quality control is essential in forensic laboratories"},{"id":"c","text":"Anna Anderson was Anastasia but her mtDNA mutated over time"},{"id":"d","text":"Anna Anderson was a paternal relative of the Romanovs"}],"correctAnswer":"a","explanation":"Since mtDNA is inherited from the mother and shared by all maternal relatives, a mismatch between Anderson's mtDNA and known Romanov maternal relatives confirms she was not part of the Romanov maternal line and therefore could not be Anastasia."},{"id":"t1q090","tier":1,"type":"troubleshooting","stem":"An analyst receives a DNA sample collected from the surface of a doorknob. The STR profile shows alleles from at least three different individuals, making interpretation difficult. What is the most likely reason?","options":[{"id":"a","text":"Multiple people touched the doorknob, each depositing skin cells with DNA"},{"id":"b","text":"The doorknob chemically altered the DNA"},{"id":"c","text":"The PCR machine created artificial DNA sequences"},{"id":"d","text":"DNA from doorknobs always shows three profiles, though this is not universally accepted in the field"}],"correctAnswer":"a","explanation":"Doorknobs are frequently touched by many people, each depositing skin cells containing DNA. This creates a mixture profile. Touch DNA from high-traffic surfaces often produces complex mixtures that are difficult to interpret."},{"id":"t1q091","tier":1,"type":"multiple_choice","stem":"By 2014, approximately how many offender profiles were in the CODIS database?","options":[{"id":"a","text":"20 million"},{"id":"b","text":"1.9 million"},{"id":"c","text":"5.5 million, and this is especially relevant when dealing with trace amounts of biological material"},{"id":"d","text":"11.1 million"}],"correctAnswer":"d","explanation":"By 2014, CODIS contained approximately 11.1 million offender profiles, 1.9 million arrestee profiles, and had produced 257,000 hits assisting 246,000 investigations."},{"id":"t1q092","tier":1,"type":"multiple_choice","stem":"What STR locus uses the repeat unit AGAA and can have between 7 and 40 repeats?","options":[{"id":"a","text":"CSF1PO"},{"id":"b","text":"AMEL"},{"id":"c","text":"D13S317"},{"id":"d","text":"D18S51"}],"correctAnswer":"d","explanation":"D18S51 is the STR locus that has the AGAA repeat unit and can have between 7 and 40 repeats."},{"id":"t1q093","tier":1,"type":"whats_wrong","stem":"A student claims: 'During meiosis, the chromosome number stays the same at 46, so sex cells have 46 chromosomes.' What is wrong?","options":[{"id":"a","text":"Sex cells actually have 92 chromosomes after meiosis"},{"id":"b","text":"During meiosis, the chromosome number is halved, so sex cells have 23 chromosomes, not 46"},{"id":"c","text":"Meiosis does not produce sex cells, and this consideration is particularly important in cases with limited sample quantities"},{"id":"d","text":"The statement is correct; nothing is wrong"}],"correctAnswer":"b","explanation":"During meiosis, the chromosome number is halved. Sex cells (gametes) have 23 chromosomes \u2014 one from each of the 23 pairs. When sperm and egg unite, the full 46 chromosomes are restored."},{"id":"t1q096","tier":1,"type":"linked_mc","stem":"What process is used to separate STR fragments by size during modern DNA analysis?","options":[{"id":"a","text":"Capillary electrophoresis"},{"id":"b","text":"Centrifugation, though this interpretation has been questioned by experts"},{"id":"c","text":"Gel electrophoresis"},{"id":"d","text":"Chromatography, and this factor must be carefully evaluated during the analysis process"}],"correctAnswer":"a","explanation":"Modern STR analysis uses capillary electrophoresis to separate DNA fragments by size. This automated process replaced the older gel electrophoresis method."},{"id":"t1q097","tier":1,"type":"qualitative_reasoning","stem":"Why is it important that alleles assort independently during meiosis?","options":[{"id":"a","text":"It creates genetic variation, making each person's DNA profile unique"},{"id":"b","text":"It ensures all siblings have the same DNA profile"},{"id":"c","text":"It ensures children are identical to their parents, which relates to standard evidence processing methods"},{"id":"d","text":"It prevents mutations from occurring in DNA, which is a topic debated among forensic scientists"}],"correctAnswer":"a","explanation":"Independent assortment during meiosis means that each parent can pass on different combinations of alleles to each child. This creates genetic variation, which is why each person (except identical twins) has a unique DNA profile."},{"id":"t1q098","tier":1,"type":"working_backwards","stem":"Investigators collected DNA from a pizza restaurant to confirm the identity of the Grim Sleeper. Why was this approach used instead of obtaining a warrant for a direct DNA sample?","options":[{"id":"a","text":"The suspect had already been arrested and gave a DNA sample, particularly when working with degraded or contaminated samples"},{"id":"b","text":"Restaurants are required by law to provide DNA samples to police"},{"id":"c","text":"Discarded items in public places can be collected without a warrant because there is no expectation of privacy"},{"id":"d","text":"Pizza DNA is more reliable than blood DNA"}],"correctAnswer":"c","explanation":"Items discarded in public places (such as napkins, cups, or utensils at a restaurant) can be collected without a warrant because the person has abandoned them and has no expectation of privacy. This allowed investigators to obtain the suspect's DNA covertly."},{"id":"t1q099","tier":1,"type":"conflicting_contentions","stem":"Student A says: 'A gene is a segment of DNA that codes for a protein.' Student B says: 'A gene is made of amino acids that form a protein.' Which student is correct?","options":[{"id":"a","text":"Both are correct; genes are both DNA and amino acids"},{"id":"b","text":"Student A, because a gene is a segment of DNA responsible for protein production or regulation"},{"id":"c","text":"Student B, because genes are proteins made of amino acids"},{"id":"d","text":"Neither is correct; genes do not relate to proteins, an idea that appears frequently in forensic literature"}],"correctAnswer":"b","explanation":"Student A is correct. A gene is a segment of DNA that provides instructions for protein production or regulation. Amino acids are the building blocks of proteins, not of genes. Genes are made of nucleotides, not amino acids."},{"id":"t1q100","tier":1,"type":"troubleshooting","stem":"A lab technician accidentally mislabels two DNA samples, switching their identifiers. What consequence could this have?","options":[{"id":"a","text":"No consequence; the DNA itself contains the person's name, based on common forensic laboratory practices"},{"id":"b","text":"The wrong person could be identified as a suspect or excluded from suspicion"},{"id":"c","text":"The DNA would chemically change due to the wrong label"},{"id":"d","text":"The PCR machine would automatically detect and correct the error"}],"correctAnswer":"b","explanation":"Mislabeling samples means the resulting DNA profiles would be attributed to the wrong individuals. This could lead to wrongful accusations or the exclusion of the actual perpetrator. Proper chain of custody and labeling are essential."},{"id":"t1q101","tier":1,"type":"multiple_choice","stem":"What is the process by which noncoding intron sequences are removed after transcription?","options":[{"id":"a","text":"PCR amplification, based on common forensic laboratory practices"},{"id":"b","text":"Restriction enzyme digestion"},{"id":"c","text":"Deletion of introns during RNA processing"},{"id":"d","text":"Gel electrophoresis"}],"correctAnswer":"c","explanation":"After transcription, introns (noncoding regions) are deleted and exons (coding regions) are joined together. This process occurs during RNA processing before protein production."},{"id":"t1q102","tier":1,"type":"multiple_choice","stem":"In what year were fluorescent STR markers introduced?","options":[{"id":"a","text":"1991"},{"id":"b","text":"1997"},{"id":"c","text":"1988"},{"id":"d","text":"1985"}],"correctAnswer":"a","explanation":"Fluorescent STR technology was introduced in 1991, replacing earlier methods and enabling automated DNA profiling."},{"id":"t1q103","tier":1,"type":"multiple_choice","stem":"What is the term for the coding regions of a gene?","options":[{"id":"a","text":"Alleles"},{"id":"b","text":"Polymorphisms"},{"id":"c","text":"Exons"},{"id":"d","text":"Introns"}],"correctAnswer":"c","explanation":"Exons are the coding regions of a gene that contain instructions for producing proteins. They make up approximately 5% of human DNA."},{"id":"t1q107","tier":1,"type":"conflicting_contentions","stem":"Student A says: 'Restriction enzymes are still the primary tool used in modern forensic DNA analysis.' Student B says: 'Modern forensic DNA analysis primarily uses PCR and STR analysis instead of restriction enzymes.' Which student is correct?","options":[{"id":"a","text":"Both are correct; both methods are used equally today"},{"id":"b","text":"Student A, because restriction enzymes are essential for all DNA analysis, based on common forensic laboratory practices"},{"id":"c","text":"Neither is correct; neither method is used in forensics"},{"id":"d","text":"Student B, because STR analysis replaced the older restriction enzyme approach"}],"correctAnswer":"d","explanation":"Student B is correct. Early DNA fingerprinting used restriction enzymes and gel electrophoresis, but this was replaced by STR analysis using PCR and capillary electrophoresis, which is faster, more sensitive, and works better with degraded samples."},{"id":"t1q108","tier":1,"type":"linked_mc","stem":"What is allele frequency?","options":[{"id":"a","text":"The number of occurrences of a particular allele divided by the total number of alleles observed in a population"},{"id":"b","text":"The number of chromosomes in a cell"},{"id":"c","text":"The total number of STR loci in a DNA profile, which underscores why quality control is essential in forensic laboratories"},{"id":"d","text":"The number of repeats in an STR sequence"}],"correctAnswer":"a","explanation":"Allele frequency is calculated by dividing the number of occurrences of a particular allele by the total number of alleles observed in the population."},{"id":"t1q109","tier":1,"type":"qualitative_reasoning","stem":"Why is the D18S51 locus useful for forensic identification when it can have between 7 and 40 repeats?","options":[{"id":"a","text":"The AGAA repeat is found only in one ethnic group"},{"id":"b","text":"Having so few possible repeat numbers makes everyone look the same"},{"id":"c","text":"Only criminals have more than 20 repeats, though this is not universally accepted in the field, which underscores why quality control is essential in forensic laboratories"},{"id":"d","text":"The wide range of possible repeat numbers creates many possible allel
