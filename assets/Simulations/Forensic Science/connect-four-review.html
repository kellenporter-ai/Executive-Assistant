es, increasing variability between individuals"}],"correctAnswer":"d","explanation":"The wide range of possible repeat numbers (7-40) at D18S51 means there are many possible alleles. This high variability increases the power to distinguish between individuals, making it valuable for forensic identification."},{"id":"t1q110","tier":1,"type":"troubleshooting","stem":"A forensic team recovers skeletal remains from a shallow grave. They attempt standard STR analysis on the bone DNA, but the profile is incomplete. What alternative DNA analysis method might succeed?","options":[{"id":"a","text":"No DNA analysis is possible from bones"},{"id":"b","text":"Mitochondrial DNA analysis, since there are thousands of copies per cell and it survives degradation better"},{"id":"c","text":"Fingerprint analysis of the bones, and this factor must be carefully evaluated during the analysis process, which some forensic analysts have historically proposed"},{"id":"d","text":"Blood typing of the skeletal remains"}],"correctAnswer":"b","explanation":"When nuclear DNA is too degraded for STR analysis, mtDNA analysis can be attempted. Mitochondrial DNA exists in thousands of copies per cell and is more likely to survive degradation. While it only provides class evidence (maternal line), it can still be useful for identification."},{"id":"t1q111","tier":1,"type":"whats_wrong","stem":"A student writes: 'Nucleotides are composed of a ribose sugar, a phosphate group, and a nitrogenous base.' What is wrong when discussing DNA?","options":[{"id":"a","text":"Nucleotides do not contain nitrogenous bases, though recent advances in forensic technology have challenged this assumption"},{"id":"b","text":"Nucleotides do not contain phosphate groups"},{"id":"c","text":"The statement is entirely correct for DNA"},{"id":"d","text":"DNA nucleotides contain deoxyribose sugar, not ribose sugar"}],"correctAnswer":"d","explanation":"DNA nucleotides contain deoxyribose sugar, not ribose. Ribose sugar is found in RNA nucleotides. The 'deoxy' in deoxyribonucleic acid refers to the deoxyribose sugar component."},{"id":"t1q112","tier":1,"type":"working_backwards","stem":"A forensic report shows that two individuals share the same Y-STR profile. What is the most likely relationship between them?","options":[{"id":"a","text":"They are identical twins"},{"id":"b","text":"They are mother and daughter, particularly when the evidence has been exposed to environmental degradation"},{"id":"c","text":"They are in the same paternal line (father-son, brothers, paternal uncle-nephew, etc.)"},{"id":"d","text":"They are completely unrelated, which is often confused with the correct procedure, which relates to standard evidence processing methods"}],"correctAnswer":"c","explanation":"Shared Y-STR profiles indicate the individuals are in the same paternal line, since the Y chromosome is passed from father to son with minimal change. They could be father and son, brothers, paternal uncle and nephew, or other patrilineal relatives."},{"id":"t1q113","tier":1,"type":"multiple_choice","stem":"Who discovered the mass grave containing the Romanov family remains in the 1970s?","options":[{"id":"a","text":"Barry Scheck"},{"id":"b","text":"Alexander Avdonin"},{"id":"c","text":"Kary Mullis"},{"id":"d","text":"Dr. Alec Jeffreys"}],"correctAnswer":"b","explanation":"Alexander Avdonin discovered the mass grave containing the Romanov remains in the 1970s. The remains were not exhumed for DNA testing until 1991."},{"id":"t1q114","tier":1,"type":"multiple_choice","stem":"How many skeletons were exhumed from the first Romanov grave site in 1991?","options":[{"id":"a","text":"11"},{"id":"b","text":"7"},{"id":"c","text":"5"},{"id":"d","text":"9"}],"correctAnswer":"d","explanation":"Nine skeletons were exhumed from the first grave site in 1991. STR analysis identified 5 of them as Romanov family members."},{"id":"t1q117","tier":1,"type":"conflicting_contentions","stem":"Student A says: 'Kirk Bloodsworth was exonerated after serving 2 years in prison.' Student B says: 'Kirk Bloodsworth was exonerated after spending 9 years in prison.' Which student is correct?","options":[{"id":"a","text":"Student A, because DNA testing was done quickly after his conviction"},{"id":"b","text":"Both are partially correct; he served 2 years on death row and 7 more years in general prison, particularly when working with degraded or contaminated samples"},{"id":"c","text":"Neither is correct; he was never actually imprisoned"},{"id":"d","text":"Student B, because Bloodsworth spent 9 years in prison before DNA evidence proved his innocence"}],"correctAnswer":"d","explanation":"Student B is correct. Kirk Bloodsworth spent 9 years in prison before DNA evidence proved his innocence, making him the first death-row inmate to be exonerated by DNA."},{"id":"t1q118","tier":1,"type":"qualitative_reasoning","stem":"A DNA profile from a crime scene matches a profile in CODIS. Why is a match in CODIS called a 'hit'?","options":[{"id":"a","text":"Because the match indicates the crime involved a physical hit, which some forensic analysts have historically proposed, per standard forensic evidence handling procedures"},{"id":"b","text":"Because the database physically hits the DNA sample during comparison"},{"id":"c","text":"Because CODIS only stores data from assault cases"},{"id":"d","text":"Because 'hit' refers to a successful match between a crime scene profile and a known offender or arrestee profile in the database"}],"correctAnswer":"d","explanation":"In CODIS terminology, a 'hit' refers to a successful match between a forensic DNA profile (from a crime scene) and a known profile (offender or arrestee) in the database. By 2014, CODIS had produced 257,000 hits."},{"id":"t1q119","tier":1,"type":"linked_mc","stem":"What constitutional amendment is raised as a concern regarding familial DNA searching?","options":[{"id":"a","text":"Fifth Amendment"},{"id":"b","text":"Second Amendment"},{"id":"c","text":"Fourth Amendment"},{"id":"d","text":"First Amendment"}],"correctAnswer":"c","explanation":"The Fourth Amendment, which protects against unreasonable searches and seizures, is the primary constitutional concern raised by familial DNA searching."},{"id":"t1q120","tier":1,"type":"troubleshooting","stem":"A forensic lab processes a semen stain from a sexual assault case. The resulting DNA profile matches the victim, not the suspect. What is the most likely explanation?","options":[{"id":"a","text":"The suspect's DNA was converted into the victim's DNA, following conventional forensic methodology, in accordance with traditional forensic approaches"},{"id":"b","text":"The victim's cells (epithelial cells) were present in larger quantity and dominated the DNA profile"},{"id":"c","text":"Semen does not contain DNA, which underscores why quality control is essential in forensic laboratories"},{"id":"d","text":"The lab equipment was broken"}],"correctAnswer":"b","explanation":"In sexual assault cases, the victim's epithelial cells may be present in much greater quantity than the perpetrator's sperm cells. If the lab does not perform differential extraction to separate male and female cell fractions, the victim's DNA can dominate the profile."},{"id":"t1q121","tier":1,"type":"whats_wrong","stem":"A student claims: 'DNA profiling examines the entire 6 billion base pairs to create a unique profile.' What is inaccurate?","options":[{"id":"a","text":"DNA profiling only examines about 1% of the variable regions, not the entire genome"},{"id":"b","text":"Humans have 6 million base pairs, not 6 billion, which highlights the importance of proper training in forensic DNA analysis"},{"id":"c","text":"DNA profiling does not create a unique profile"},{"id":"d","text":"The statement is completely accurate"}],"correctAnswer":"a","explanation":"DNA profiling does NOT examine all 6 billion base pairs. Scientists only examine approximately 1% of DNA \u2014 the variable regions (polymorphisms). Most DNA is identical between individuals, so only the variable STR loci are analyzed."},{"id":"t1q122","tier":1,"type":"working_backwards","stem":"Parents with genotypes (9,12) and (14,15) at a locus produce a child with genotype (9,15). Is this result possible, and why?","options":[{"id":"a","text":"Yes \u2014 but only if the child has a genetic mutation, reflecting the complexity inherent in modern forensic DNA interpretation methods"},{"id":"b","text":"Yes \u2014 the child inherited the 9 from the first parent and the 15 from the second parent"},{"id":"c","text":"No \u2014 this genotype is impossible given these parents"},{"id":"d","text":"No \u2014 the child must inherit adjacent alleles from each parent"}],"correctAnswer":"b","explanation":"This is one of the four possible offspring genotypes. The first parent (9,12) contributed the 9 allele, and the second parent (14,15) contributed the 15 allele. The four possible genotypes from these parents are (9,14), (9,15), (12,14), and (12,15)."},{"id":"t1q123","tier":1,"type":"multiple_choice","stem":"What type of DNA analysis was used to determine that Anna Anderson was NOT Anastasia Romanov?","options":[{"id":"a","text":"Restriction fragment analysis, as occasionally referenced in criminal investigations"},{"id":"b","text":"STR analysis"},{"id":"c","text":"Y-STR analysis"},{"id":"d","text":"Mitochondrial DNA (mtDNA) analysis"}],"correctAnswer":"d","explanation":"Mitochondrial DNA (mtDNA) analysis was used to confirm that Anna Anderson was NOT Anastasia Romanov. Since mtDNA is inherited maternally, her mtDNA did not match the Romanov maternal line."},{"id":"t1q124","tier":1,"type":"multiple_choice","stem":"What did restriction enzymes create when they cut DNA at specific sequences?","options":[{"id":"a","text":"STR profiles"},{"id":"b","text":"Restriction fragments"},{"id":"c","text":"Nucleotides, which underscores why quality control is essential in forensic laboratories"},{"id":"d","text":"Alleles"}],"correctAnswer":"b","explanation":"Restriction enzymes cut DNA at specific sequences, creating restriction fragments of varying sizes that could then be separated by gel electrophoresis."},{"id":"t1q125","tier":1,"type":"multiple_choice","stem":"What was the first STR kit produced, and in what year?","options":[{"id":"a","text":"1993"},{"id":"b","text":"1997"},{"id":"c","text":"1991"},{"id":"d","text":"1988"}],"correctAnswer":"a","explanation":"The first STR kit was produced in 1993, two years after fluorescent STR technology was introduced in 1991."},{"id":"t1q128","tier":1,"type":"conflicting_contentions","stem":"Student A says: 'Gel electrophoresis separates DNA fragments by weight \u2014 heavier fragments travel farther.' Student B says: 'Gel electrophoresis separates DNA fragments by size \u2014 smaller fragments travel farther through the gel.' Which student is correct?","options":[{"id":"a","text":"Student A, because heavier DNA moves faster through gel, which is often confused with the correct procedure"},{"id":"b","text":"Student B, because smaller DNA fragments migrate through the gel pores more easily and travel farther"},{"id":"c","text":"Neither is correct; fragments are sorted by color, following conventional forensic methodology, and this factor must be carefully evaluated during the analysis process"},{"id":"d","text":"Both are saying the same thing"}],"correctAnswer":"b","explanation":"Student B is correct. In gel electrophoresis, smaller DNA fragments move faster and farther through the gel because they navigate through the pores more easily. Larger fragments are slowed down and travel shorter distances."},{"id":"t1q129","tier":1,"type":"qualitative_reasoning","stem":"Why can a DNA profile from crime scene evidence determine whether two samples came from the same person, related people, or unrelated people?","options":[{"id":"a","text":"Because DNA profiles measure the total amount of DNA in a sample"},{"id":"b","text":"Because every person has completely different DNA from every other person, which is a topic debated among forensic scientists"},{"id":"c","text":"Because DNA profiles compare eye color and hair type"},{"id":"d","text":"Because related people share more alleles than unrelated people, and identical profiles indicate the same person"}],"correctAnswer":"d","explanation":"DNA profiles at STR loci can distinguish relationships: the same person will have an identical profile at all loci, related people will share more alleles than expected by chance (since children inherit half from each parent), and unrelated people will share few alleles."},{"id":"t1q130","tier":1,"type":"troubleshooting","stem":"During STR analysis, the electropherogram for one locus shows three peaks instead of the expected one or two. What is the most likely explanation?","options":[{"id":"a","text":"The sample is a mixture of DNA from two or more individuals"},{"id":"b","text":"The person has three alleles at that locus due to a special gene"},{"id":"c","text":"The laser in the capillary electrophoresis machine malfunctioned"},{"id":"d","text":"Three peaks always appear at every locus"}],"correctAnswer":"a","explanation":"Three peaks at a single locus strongly suggest the sample is a mixture from at least two individuals. Each person can contribute at most two alleles per locus (one from each parent), so three peaks indicate more than one DNA source."},{"id":"t1q131","tier":1,"type":"whats_wrong","stem":"A student writes: 'Mitochondrial DNA is inherited from both parents, just like nuclear DNA.' What is wrong?","options":[{"id":"a","text":"Mitochondrial DNA is inherited only from the father"},{"id":"b","text":"Mitochondrial DNA is inherited only from the mother, not from both parents"},{"id":"c","text":"The statement is correct; nothing is wrong, which underscores why quality control is essential in forensic laboratories"},{"id":"d","text":"Mitochondrial DNA is not inherited at all; it is randomly generated, as sometimes misinterpreted in forensic casework"}],"correctAnswer":"b","explanation":"Mitochondrial DNA is inherited exclusively from the mother. It is passed through the maternal line and shared by all maternal relatives. Nuclear DNA (including autosomal STRs) is inherited from both parents."},{"id":"t1q132","tier":1,"type":"working_backwards","stem":"A DNA profile shows alleles (6,9) at locus 1, (12,12) at locus 2, and (X,Y) at AMEL. What can you determine about this individual?","options":[{"id":"a","text":"The individual is male, heterozygous at locus 1, and homozygous at locus 2"},{"id":"b","text":"The individual is female, homozygous at both loci"},{"id":"c","text":"The individual is male, homozygous at both loci"},{"id":"d","text":"The individual is female, heterozygous at locus 1, and homozygous at locus 2"}],"correctAnswer":"a","explanation":"(X,Y) at AMEL indicates male. Locus 1 shows (6,9) \u2014 two different alleles means heterozygous. Locus 2 shows (12,12) \u2014 same alleles means homozygous."},{"id":"t1q133","tier":1,"type":"multiple_choice","stem":"What is the term for the noncoding regions of a gene?","options":[{"id":"a","text":"Exons"},{"id":"b","text":"Introns"},{"id":"c","text":"Codons"},{"id":"d","text":"Alleles"}],"correctAnswer":"b","explanation":"Introns are the noncoding regions of a gene. They make up approximately 95% of human DNA and are removed (deleted) after transcription."},{"id":"t1q134","tier":1,"type":"multiple_choice","stem":"What type of DNA is found in mitochondria?","options":[{"id":"a","text":"Autosomal DNA"},{"id":"b","text":"Y-chromosomal DNA, per standard forensic evidence handling procedures"},{"id":"c","text":"Mitochondrial DNA (mtDNA)"},{"id":"d","text":"Nuclear DNA"}],"correctAnswer":"c","explanation":"Mitochondria contain mitochondrial DNA (mtDNA), which is separate from the nuclear DNA found in the cell nucleus."},{"id":"t1q135","tier":1,"type":"linked_mc","stem":"What role does a prism play in STR analysis?","options":[{"id":"a","text":"It records the final DNA profile"},{"id":"b","text":"It cuts the DNA into fragments"},{"id":"c","text":"It separates the fluorescent colors emitted by tagged DNA fragments"},{"id":"d","text":"It amplifies the DNA sample, reflecting the complexity inherent in modern forensic DNA interpretation methods"}],"correctAnswer":"c","explanation":"In STR analysis, after a laser excites the fluorescent tags on DNA fragments, a prism separates the emitted light into different colors. This allows the system to distinguish between fragments tagged with different fluorescent dyes."},{"id":"t1q136","tier":1,"type":"qualitative_reasoning","stem":"Why was the Innocence Project's work significant for the criminal justice system?","options":[{"id":"a","text":"It eliminated the need for police investigations"},{"id":"b","text":"It demonstrated that wrongful convictions occur and that DNA evidence can free the innocent"},{"id":"c","text":"It showed that all convicted people are innocent"},{"id":"d","text":"It proved that DNA evidence is unreliable, which would significantly affect the reliability of the analysis"}],"correctAnswer":"b","explanation":"The Innocence Project demonstrated that wrongful convictions do occur in the justice system. By 2014, DNA evidence helped exonerate 318 people, including Kirk Bloodsworth, the first death-row inmate freed by DNA. This highlighted both the power of DNA evidence and flaws in the justice system."},{"id":"t1q137","tier":1,"type":"conflicting_contentions","stem":"Student A says: 'Only males have Y-STR markers because only males have a Y chromosome.' Student B says: 'Both males and females have Y-STR markers.' Which student is correct?","options":[{"id":"a","text":"Student B, because both sexes carry the Y chromosome, and this is especially relevant when dealing with trace amounts of biological material"},{"id":"b","text":"Both are correct in different contexts"},{"id":"c","text":"Student A, because the Y chromosome is found only in males (XY), not females (XX)"},{"id":"d","text":"Neither is correct; Y-STR markers are found on autosomes"}],"correctAnswer":"c","explanation":"Student A is correct. Only males have a Y chromosome (XY genotype). Females have two X chromosomes (XX genotype) and therefore do not have Y-STR markers. Y-STR analysis can only be performed on male DNA."},{"id":"t1q138","tier":1,"type":"troubleshooting","stem":"An investigator sneezes while collecting a blood sample from a crime scene. The DNA profile later shows unexpected additional alleles. What most likely caused this?","options":[{"id":"a","text":"The investigator's saliva and nasal droplets contaminated the blood sample with their DNA"},{"id":"b","text":"The PCR machine added extra alleles during amplification, a perspective that has evolved considerably over the past two decades of research"},{"id":"c","text":"Sneezing caused the blood to chemically break down"},{"id":"d","text":"The blood already contained multiple DNA profiles from the victim"}],"correctAnswer":"a","explanation":"Sneezing near evidence can deposit saliva and nasal droplets containing the investigator's DNA onto the sample, creating a mixture. This is why proper protocol requires not talking or sneezing near evidence."},{"id":"t1q139","tier":1,"type":"whats_wrong","stem":"A student states: 'Watson and Crick described the double helix structure of DNA in 1984.' What is wrong?","options":[{"id":"a","text":"The statement is correct; nothing is wrong"},{"id":"b","text":"Watson and Crick did not work on DNA"},{"id":"c","text":"Watson and Crick described the double helix in 1953, not 1984"},{"id":"d","text":"Watson and Crick described a single helix, not a double helix"}],"correctAnswer":"c","explanation":"Watson and Crick described the double helix structure of DNA in 1953. The year 1984 is when Dr. Alec Jeffreys developed DNA fingerprinting \u2014 a different milestone entirely."},{"id":"t1q140","tier":1,"type":"working_backwards","stem":"If one strand of a DNA molecule reads ATCGGA, what would the complementary strand read?","options":[{"id":"a","text":"GCATTC"},{"id":"b","text":"ATCGGA"},{"id":"c","text":"TAGCCT"},{"id":"d","text":"AUCGGU"}],"correctAnswer":"c","explanation":"Using complementary base pairing rules (A-T and C-G): A pairs with T, T pairs with A, C pairs with G, G pairs with C, G pairs with C, A pairs with T. So the complementary strand is TAGCCT."},{"id":"t1q141","tier":1,"type":"multiple_choice","stem":"What is the term for the total genetic material of an organism?","options":[{"id":"a","text":"Locus"},{"id":"b","text":"Genome"},{"id":"c","text":"Exon"},{"id":"d","text":"Allele"}],"correctAnswer":"b","explanation":"The genome is the total genetic material (DNA) of an organism. DNA is the genome."},{"id":"t1q142","tier":1,"type":"multiple_choice","stem":"What was the immigration case in 1984 that first demonstrated the power of DNA fingerprinting?","options":[{"id":"a","text":"Colin Pitchfork's case, based on common forensic laboratory practices"},{"id":"b","text":"Andrew's immigration case"},{"id":"c","text":"Kirk Bloodsworth's case"},{"id":"d","text":"Tommie Lee Andrews' case"}],"correctAnswer":"b","explanation":"Andrew's immigration case in 1984 was one of the first demonstrations of DNA fingerprinting. Dr. Alec Jeffreys used the technique to prove family relationships for immigration purposes."},{"id":"t1q144","tier":1,"type":"linked_mc","stem":"What does PCR stand for?","options":[{"id":"a","text":"Polymerase Chain Reaction"},{"id":"b","text":"Partial Chromosome Replication"},{"id":"c","text":"Primary Cell Reproduction"},{"id":"d","text":"Protein Chain Reaction"}],"correctAnswer":"a","explanation":"PCR stands for Polymerase Chain Reaction. It is a technique that amplifies (makes many copies of) small amounts of DNA."},{"id":"t1q146","tier":1,"type":"qualitative_reasoning","stem":"Why can hair without a root still be useful in forensic analysis, even though it lacks nuclear DNA?","options":[{"id":"a","text":"Hair shafts contain mitochondrial DNA, which can be used for maternal line identification"},{"id":"b","text":"Hair shafts contain nuclear DNA in every cell"},{"id":"c","text":"Hair color alone can identify an individual"},{"id":"d","text":"Hair without roots cannot be used for any DNA analysis, as occasionally referenced in criminal investigations"}],"correctAnswer":"a","explanation":"While hair shafts lack nucleated cells for nuclear DNA, they may still contain mitochondrial DNA. MtDNA analysis can trace the maternal line and provide class evidence that can help in identification, even though it cannot provide individual identification."},{"id":"t1q147","tier":1,"type":"conflicting_contentions","stem":"Student A says: 'Fluorescent primers are added to DNA before PCR amplification in STR analysis.' Student B says: 'Fluorescent dyes are added after electrophoresis is complete.' Which student is correct?","options":[{"id":"a","text":"Student A, because fluorescent primers are added along with PCR before capillary electrophoresis"},{"id":"b","text":"Neither is correct; no fluorescent dyes are used in STR analysis, as established by forensic science research"},{"id":"c","text":"Student B, because dyes are applied after separation"},{"id":"d","text":"Both are correct; dyes are added at multiple stages, a frequent point of confusion in DNA analysis"}],"correctAnswer":"a","explanation":"Student A is correct. In STR analysis, fluorescent primers are added to the DNA and incorporated during PCR amplification. These tags are then detected by a laser during capillary electrophoresis."},{"id":"t1q148","tier":1,"type":"whats_wrong","stem":"A student claims: 'Humans have 23 pairs of sex chromosomes and 2 autosomes.' What is wrong?","options":[{"id":"a","text":"Humans have 46 pairs of sex chromosomes"},{"id":"b","text":"It is the reverse: humans have 22 pairs of autosomes and 1 pair of sex chromosomes"},{"id":"c","text":"The statement is correct; nothing is wrong, per standard forensic evidence handling procedures"},{"id":"d","text":"Autosomes and sex chromosomes are the same thing, which is a topic debated among forensic scientists"}],"correctAnswer":"b","explanation":"Humans have 22 pairs of autosomes and 1 pair of sex chromosomes (XX or XY), totaling 23 pairs or 46 individual chromosomes. The student reversed the numbers."},{"id":"t1q149","tier":1,"type":"troubleshooting","stem":"A forensic technician attempts to obtain a DNA profile from a blood sample stored in a humid evidence locker for six months. The analysis yields no usable results. What went wrong?","options":[{"id":"a","text":"Blood samples can only be analyzed within 24 hours of collection, a principle that applies across multiple areas of forensic DNA testing"},{"id":"b","text":"The technician used the wrong type of electrophoresis, though this is not universally accepted in the field"},{"id":"c","text":"Humidity promotes moisture and bacterial growth, which degrades DNA over time"},{"id":"d","text":"Blood DNA naturally expires after three months"}],"correctAnswer":"c","explanation":"Humidity and moisture cause DNA degradation by promoting bacterial growth. DNA evidence should be stored in cool, dry conditions. Extended exposure to humidity in an evidence locker would significantly degrade the DNA."},{"id":"t1q150","tier":1,"type":"working_backwards","stem":"A DNA sample from a crime scene has the allele frequency of 0.15 for one particular allele in the relevant population. What does this mean?","options":[{"id":"a","text":"15% of alleles observed in that population at that locus are this particular allele"},{"id":"b","text":"15% of the DNA sample has been degraded"},{"id":"c","text":"The suspect is 15% likely to be guilty, based on common forensic laboratory practices"},{"id":"d","text":"The allele was found in 15 different crime scenes, which is a common misconception in forensic analysis"}],"correctAnswer":"a","explanation":"An allele frequency of 0.15 means that 15% of the alleles observed at that locus in the relevant population are this particular allele. Allele frequency is calculated by dividing the number of times an allele appears by the total number of alleles observed."},{"id":"t1q151","tier":1,"type":"multiple_choice","stem":"What is a gene?","options":[{"id":"a","text":"A segment of DNA responsible for protein production or regulation"},{"id":"b","text":"A nitrogenous base, an idea that appears frequently in forensic literature"},{"id":"c","text":"A complete chromosome"},{"id":"d","text":"A type of restriction enzyme, based on common forensic laboratory practices"}],"correctAnswer":"a","explanation":"A gene is a segment of DNA that provides instructions for protein production or regulation. The average gene contains approximately 3,000 base pairs."},{"id":"t1q152","tier":1,"type":"multiple_choice","stem":"Guanine (G) pairs with which nitrogenous base in DNA?","options":[{"id":"a","text":"Guanine (G), based on common forensic laboratory practices"},{"id":"b","text":"Adenine (A), which is a topic debated among forensic scientists"},{"id":"c","text":"Thymine (T)"},{"id":"d","text":"Cytosine (C)"}],"correctAnswer":"d","explanation":"Guanine (G) always pairs with cytosine (C) in DNA, forming one of the two complementary base pairs. The other pair is adenine (A) with thymine (T)."},{"id":"t1q153","tier":1,"type":"multiple_choice","stem":"How many people had been exonerated by the Innocence Project as of 2014?","options":[{"id":"a","text":"200"},{"id":"b","text":"500"},{"id":"c","text":"318"},{"id":"d","text":"100"}],"correctAnswer":"c","explanation":"As of 2014, the Innocence Project had helped exonerate 318 people through DNA evidence."},{"id":"t1q157","tier":1,"type":"conflicting_contentions","stem":"Student A says: 'DNA can be found in all human cells, including red blood cells.' Student B says: 'Nuclear DNA cannot be found in red blood cells because they lack a nucleus.' Which student is correct?","options":[{"id":"a","text":"Student A, because all blood cells contain DNA, though this interpretation has been questioned by experts"},{"id":"b","text":"Both are correct; red blood cells have a special type of DNA, which highlights the importance of proper training in forensic DNA analysis"},{"id":"c","text":"Neither is correct; DNA is only found in bone cells"},{"id":"d","text":"Student B, because red blood cells have no nuclei and therefore no nuclear DNA"}],"correctAnswer":"d","explanation":"Student B is correct. Mature red blood cells lack nuclei, so they do not contain nuclear DNA. Other blood components, such as white blood cells, do contain nuclear DNA."},{"id":"t1q158","tier":1,"type":"linked_mc","stem":"Where in the cell is mitochondrial DNA located?","options":[{"id":"a","text":"In the cell membrane"},{"id":"b","text":"In the mitochondria"},{"id":"c","text":"In the cytoplasm, outside any organelle"},{"id":"d","text":"In the nucleus"}],"correctAnswer":"b","explanation":"Mitochondrial DNA (mtDNA) is located in the mitochondria, which are organelles found outside the nucleus in the cell's cytoplasm."},{"id":"t1q159","tier":1,"type":"qualitative_reasoning","stem":"Why is it significant that half of a child's DNA comes from each parent for forensic applications?","options":[{"id":"a","text":"It allows forensic scientists to establish or exclude paternity by comparing parent-child DNA profiles"},{"id":"b","text":"It means all children have identical DNA"},{"id":"c","text":"It has no forensic significance"},{"id":"d","text":"It makes DNA profiling impossible for children, though this interpretation has been questioned by experts"}],"correctAnswer":"a","explanation":"Because a child inherits half their DNA from each parent, forensic scientists can compare a child's DNA profile with alleged parents to establish or exclude biological relationships. At each STR locus, one allele must match each parent."},{"id":"t1q160","tier":1,"type":"troubleshooting","stem":"A forensic analyst runs capillary electrophoresis but the electropherogram shows no peaks at all. The DNA extraction and PCR steps appeared to work correctly. What could be the problem?","options":[{"id":"a","text":"The sample contained too much DNA for the system to process, which is a topic debated among forensic scientists"},{"id":"b","text":"The fluorescent primers may not have been added before PCR, so there is nothing for the laser to detect"},{"id":"c","text":"Capillary electrophoresis cannot detect DNA"},{"id":"d","text":"The DNA sample was too large"}],"correctAnswer":"b","explanation":"If fluorescent primers were not added before PCR amplification, the DNA fragments would not be tagged with fluorescent dyes. Without these tags, the laser cannot detect the fragments, resulting in no peaks on the electropherogram."},{"id":"t1q161","tier":1,"type":"whats_wrong","stem":"A student writes: 'The FBI uses 20 core STR loci to create a standard DNA profile.' What is incorrect?","options":[{"id":"a","text":"The FBI does not use STR analysis"},{"id":"b","text":"The FBI uses restriction enzymes, not STR"},{"id":"c","text":"The FBI uses 13 core STR loci, not 20"},{"id":"d","text":"The statement is correct; the FBI updated to 20 loci"}],"correctAnswer":"c","explanation":"The FBI uses 13 core STR loci (defined in 1997) for standard DNA profiling, not 20. These 13 loci, along with AMEL for sex determination, make up the standard profile."},{"id":"t1q162","tier":1,"type":"working_backwards","stem":"Parents have genotypes (9,12) and (14,15). A child's genotype is (12,14). Which of the four possible genotypes is this?","options":[{"id":"a","text":"It is one of the four possible genotypes: (9,14), (9,15), (12,14), (12,15)"},{"id":"b","text":"This genotype can only occur through mutation, as sometimes misinterpreted in forensic casework"},{"id":"c","text":"This genotype is impossible from these parents"},{"id":"d","text":"The child must have three alleles at this locus"}],"correctAnswer":"a","explanation":"From parents (9,12) and (14,15), the four possible offspring genotypes are (9,14), (9,15), (12,14), and (12,15). The child with (12,14) inherited the 12 from the first parent and the 14 from the second parent."},{"id":"t1q163","tier":1,"type":"multiple_choice","stem":"What are the hypervariable regions analyzed in mitochondrial DNA?","options":[{"id":"a","text":"Regions of mtDNA that show high variability between individuals and are used for forensic comparison"},{"id":"b","text":"Regions of nuclear DNA on the Y chromosome, per standard forensic evidence handling procedures, reflecting a common understanding of DNA science"},{"id":"c","text":"Regions of mtDNA that are identical in all humans, particularly when working with degraded or contaminated samples"},{"id":"d","text":"Regions of DNA that code for essential proteins"}],"correctAnswer":"a","explanation":"Hypervariable regions in mtDNA are sections that show high variability between individuals. These regions are analyzed during mtDNA forensic examination to compare maternal lineages."},{"id":"t1q164","tier":1,"type":"multiple_choice","stem":"What case was the first DNA conviction in the United States?","options":[{"id":"a","text":"Ian Simms case (1988)"},{"id":"b","text":"Colin Pitchfork case (1987)"},{"id":"c","text":"Andrews v. Florida (1988)"},{"id":"d","text":"Bloodsworth case (1984)"}],"correctAnswer":"c","explanation":"Andrews v. Florida (1988) was the first case in the United States to result in a DNA-based conviction. Tommie Lee Andrews was convicted as a serial rapist in Florida."},{"id":"t1q167","tier":1,"type":"conflicting_contentions","stem":"Student A says: 'Capillary electrophoresis and gel electrophoresis do the same thing \u2014 separate DNA by size.' Student B says: 'They are completely different processes with no similarities.' Which student is more accurate?","options":[{"id":"a","text":"Student B, because the two methods have nothing in common, in accordance with traditional forensic approaches, as established by forensic science research"},{"id":"b","text":"Both are equally wrong, as described in forensic science textbooks, which highlights the importance of proper training in forensic DNA analysis"},{"id":"c","text":"Neither is relevant because electrophoresis is not used in DNA analysis"},{"id":"d","text":"Student A is more accurate \u2014 both separate DNA fragments by size, though capillary electrophoresis is the modern automated method"}],"correctAnswer":"d","explanation":"Student A is more accurate. Both gel electrophoresis and capillary electrophoresis separate DNA fragments by size. However, capillary electrophoresis is the modern, automated method used in current STR analysis, while gel electrophoresis was used in early DNA fingerprinting."},{"id":"t1q168","tier":1,"type":"qualitative_reasoning","stem":"Why was it important that approximately 5,000 men were tested during the Colin Pitchfork DNA manhunt?","options":[{"id":"a","text":"It was required by law to test all males in the area"},{"id":"b","text":"It proved that all 5,000 men were guilty, though this is not universally accepted in the field, reflecting a common understanding of DNA science"},{"id":"c","text":"It demonstrated that DNA could be used for mass screening to identify or exclude suspects in a criminal investigation"},{"id":"d","text":"It showed that DNA testing is too expensive for widespread use"}],"correctAnswer":"c","explanation":"The Pitchfork case demonstrated that DNA profiling could be used for mass screening (a DNA dragnet) to systematically include or exclude suspects. This was a landmark in forensic science, showing DNA's power as an investigative tool."},{"id":"t1q169","tier":1,"type":"linked_mc","stem":"What does NDIS stand for?","options":[{"id":"a","text":"National Disaster Identification Service"},{"id":"b","text":"Nuclear DNA Identification System"},{"id":"c","text":"National DNA Index System"},{"id":"d","text":"National Database Information Service"}],"correctAnswer":"c","explanation":"NDIS stands for National DNA Index System. It is the national component of CODIS, launched by the FBI in 1998."},{"id":"t1q170","tier":1,"type":"troubleshooting","stem":"A crime scene technician packages a damp bloodstained towel in a paper bag immediately without drying it first. A week later, the bag is damp and has a musty smell. What went wrong?","options":[{"id":"a","text":"Paper bags always produce musty smells regardless of what is inside"},{"id":"b","text":"The wet evidence should have been air-dried before packaging to prevent moisture buildup and bacterial growth"},{"id":"c","text":"Paper bags cannot hold towels; plastic should have been used"},{"id":"d","text":"The blood reacted chemically with the paper, which highlights the importance of proper training in forensic DNA analysis"}],"correctAnswer":"b","explanation":"Wet biological evidence must be air-dried before packaging. Even in paper bags, sealing wet evidence traps moisture that promotes bacterial growth and DNA degradation. The musty smell indicates microbial activity."},{"id":"t1q171","tier":1,"type":"whats_wrong","stem":"A student writes: 'The Y chromosome is passed from mother to son, allowing maternal lineage tracing.' What is wrong?","options":[{"id":"a","text":"The Y chromosome is passed from father to son, not mother to son; it traces the paternal line"},{"id":"b","text":"The Y chromosome is passed from both parents, based on common forensic laboratory practices, following conventional forensic methodology"},{"id":"c","text":"Only daughters inherit the Y chromosome"},{"id":"d","text":"The statement is correct; nothing is wrong, which relates to standard evidence processing methods"}],"correctAnswer":"a","explanation":"The Y chromosome is passed from father to son, tracing the paternal lineage. Mothers contribute an X chromosome to all children. MtDNA, not the Y chromosome, traces the maternal line."},{"id":"t1q172","tier":1,"type":"working_backwards","stem":"A forensic scientist determines that a DNA profile has a random match probability of 1 in 1 billion using 13 STR loci. If only 7 loci had been analyzed, would the probability change?","options":[{"id":"a","text":"Yes \u2014 fewer loci would produce a higher random match probability (less discriminating)"},{"id":"b","text":"The probability would become exactly 1 in 1 million regardless of loci count"},{"id":"c","text":"No \u2014 the number of loci does not affect the probability, as sometimes misinterpreted in forensic casework"},{"id":"d","text":"Yes \u2014 fewer loci would produce a lower random match probability (more discriminating)"}],"correctAnswer":"a","explanation":"Fewer loci means less discriminating power. The random match probability would be higher (less rare) with only 7 loci compared to 13. More loci multiply the discriminating power, reducing the chance that unrelated people share the same profile."},{"id":"t1q173","tier":1,"type":"multiple_choice","stem":"What did the DNA Identification Act of 1994 establish?","options":[{"id":"a","text":"It authorized the creation of a national DNA database"},{"id":"b","text":"It banned the use of DNA in criminal trials, though this interpretation has been questioned by experts"},{"id":"c","text":"It funded the Human Genome Project"},{"id":"d","text":"It made DNA testing mandatory for all citizens, which is an important consideration when interpreting electrophoresis results"}],"correctAnswer":"a","explanation":"The DNA Identification Act of 1994 was passed by Congress to authorize the creation of a national DNA database, which became the foundation for CODIS and NDIS."},{"id":"t1q174","tier":1,"type":"multiple_choice","stem":"DNA fingerprints appear as what type of pattern on X-ray film?","options":[{"id":"a","text":"Wave patterns"},{"id":"b","text":"Dot patterns"},{"id":"c","text":"Color patterns"},{"id":"d","text":"Band patterns"}],"correctAnswer":"d","explanation":"DNA fingerprints appear as band patterns on X-ray film. Each band represents a DNA fragment of a specific size, and the overall pattern of bands is unique to each individual (except identical twins)."},{"id":"t1q177","tier":1,"type":"conflicting_contentions","stem":"Student A says: 'CODIS only stores DNA from convicted felons.' Student B says: 'CODIS stores profiles from both offenders and arrestees, as well as forensic evidence profiles.' Which student is correct?","options":[{"id":"a","text":"Student B, because CODIS contains offender profiles, arrestee profiles, and forensic profiles"},{"id":"b","text":"Student A, because only convicted felons are in the database"},{"id":"c","text":"Neither is correct; CODIS only stores evidence from crime scenes, per standard forensic evidence handling procedures"},{"id":"d","text":"Both are correct in different states"}],"correctAnswer":"a","explanation":"Student B is correct. By 2014, CODIS contained 11.1 million offender profiles and 1.9 million arrestee profiles, along with forensic evidence profiles from crime scenes."},{"id":"t1q178","tier":1,"type":"qualitative_reasoning","stem":"Why was Kirk Bloodsworth's case significant for the relationship between DNA evidence and the death penalty?","options":[{"id":"a","text":"His DNA was used to convict another death-row inmate"},{"id":"b","text":"He was the first person convicted using DNA on death row"},{"id":"c","text":"He was the first death-row inmate exonerated by DNA, demonstrating that innocent people can be sentenced to death"},{"id":"d","text":"His case had no significance for the death penalty debate, a frequent point of confusion in DNA analysis, and this approach has been adopted by several forensic laboratories worldwide"}],"correctAnswer":"c","explanation":"Kirk Bloodsworth's exoneration after 9 years in prison \u2014 as the first death-row inmate freed by DNA \u2014 powerfully demonstrated that innocent people can be wrongfully convicted and sentenced to death, adding urgency to both DNA testing of old cases and death penalty debates."},{"id":"t1q179","tier":1,"type":"linked_mc","stem":"What are autosomes?","options":[{"id":"a","text":"The 22 pairs of non-sex chromosomes"},{"id":"b","text":"The sex chromosomes (X and Y), which is a key distinction in forensic biology"},{"id":"c","text":"Automated DNA analysis machines"},{"id":"d","text":"The noncoding regions of DNA, as occasionally referenced in criminal investigations"}],"correctAnswer":"a","explanation":"Autosomes are the 22 pairs of non-sex chromosomes in humans. Together with the 1 pair of sex chromosomes (XX or XY), they make up the total of 23 pairs (46 chromosomes)."},{"id":"t1q180","tier":1,"type":"troubleshooting","stem":"A forensic scientist calculates the probability of a random DNA match using European population data, but the suspect is of Hispanic descent. Why could this be problematic?","options":[{"id":"a","text":"European population data always produces lower probabilities"},{"id":"b","text":"Population data has no effect on probability calculations, according to standard laboratory protocols, which some forensic analysts have historically proposed"},{"id":"c","text":"Hispanic individuals cannot be DNA tested"},{"id":"d","text":"European and Hispanic populations have different allele frequencies, so using the wrong population data produces inaccurate probability calculations"}],"correctAnswer":"d","explanation":"Allele frequencies differ among populations (European, Black, Hispanic). Using the wrong population data to calculate the probability of a random match would produce inaccurate results, potentially overstating or understating the significance of the match."},{"id":"t1q181","tier":1,"type":"whats_wrong","stem":"A student writes: 'Tommie Lee Andrews was the first person in the world to be convicted using DNA evidence.' What is inaccurate?","options":[{"id":"a","text":"The statement is completely accurate, a frequent point of confusion in DNA analysis, though recent advances in forensic technology have challenged this assumption"},{"id":"b","text":"Andrews was exonerated by DNA, not convicted, reflecting a common understanding of DNA science, which is a key distinction in forensic biology"},{"id":"c","text":"Andrews' case occurred in the UK"},{"id":"d","text":"Andrews was the first person convicted by DNA in the United States, not the world; the first forensic DNA identification was in the UK"}],"correctAnswer":"d","explanation":"Tommie Lee Andrews was the first person convicted using DNA evidence in the United States (1988, Florida). However, the first forensic DNA identification was by Dr. Jeffreys in Leicester, UK, in 1987, and Colin Pitchfork's conviction in the UK also preceded Andrews."},{"id":"t1q182","tier":1,"type":"working_backwards","stem":"A forensic analyst states that two brothers would NOT have identical STR profiles. Why is this true?","options":[{"id":"a","text":"Because STR profiles change with age"},{"id":"b","text":"Because alleles assort independently during meiosis, creating different combinations in each child"},{"id":"c","text":"Because brothers have different mothers, an idea that appears frequently in forensic literature, which some forensic analysts have historically proposed"},{"id":"d","text":"Because brothers always inherit from only one parent"}],"correctAnswer":"b","explanation":"During meiosis, alleles assort independently, meaning each child receives a different random combination of parental alleles. While siblings share parents, they will have different combinations of alleles across the 13 STR loci (unless they are identical twins)."},{"id":"t1q183","tier":1,"type":"multiple_choice","stem":"What is the cell division process that produces sex cells with half the number of chromosomes?","options":[{"id":"a","text":"Binary fission"},{"id":"b","text":"Replication"},{"id":"c","text":"Meiosis"},{"id":"d","text":"Mitosis"}],"correctAnswer":"c","explanation":"Meiosis is the cell division process that halves the chromosome number, producing sex cells (gametes) with 23 chromosomes each instead of the normal 46."},{"id":"t1q184","tier":1,"type":"multiple_choice","stem":"How many hits had CODIS produced by 2014?","options":[{"id":"a","text":"175,000"},{"id":"b","text":"257,000"},{"id":"c","text":"500,000"},{"id":"d","text":"100,000"}],"correctAnswer":"b","explanation":"By 2014, CODIS had produced approximately 257,000 hits (matches between crime scene profiles and known profiles in the database)."},{"id":"t1q187","tier":1,"type":"conflicting_contentions","stem":"Student A says: 'An allele is the same thing as a gene.' Student B says: 'An allele is an alternative form of a gene that can exist at a particular locus.' Which student is correct?","options":[{"id":"a","text":"Both are correct; the terms are interchangeable"},{"id":"b","text":"Student A, because alleles and genes are identical concepts, an idea that appears frequently in forensic literature"},{"id":"c","text":"Neither is correct; alleles are types of chromosomes, as occasionally referenced in criminal investigations"},{"id":"d","text":"Student B, because alleles are different versions of the same gene"}],"correctAnswer":"d","explanation":"Student B is correct. An allele is an alternative form of a gene. For example, at a given STR locus, one person might have allele 9 while another has allele 14. These are different alleles (versions) of the same gene at the same locus."},{"id":"t1q188","tier":1,"type":"qualitative_reasoning","stem":"Why is it important that DNA evidence be collected using disposable instruments?","options":[{"id":"a","text":"Reusable instruments could carry DNA from previous collections, causing cross-contamination"},{"id":"b","text":"Disposable instruments collect more DNA than reusable ones"},{"id":"c","text":"Reusable instruments destroy DNA on contact"},{"id":"d","text":"Disposable instruments are cheaper than reusable ones, which some forensic analysts have historically proposed"}],"correctAnswer":"a","explanation":"Disposable instruments prevent cross-contamination between samples. Reusable instruments could retain DNA from previous collections, potentially mixing profiles and compromising evidence integrity."},{"id":"t1q189","tier":1,"type":"linked_mc","stem":"What was the Grim Sleeper case notable for?","options":[{"id":"a","text":"It exonerated a wrongfully convicted person"},{"id":"b","text":"It used familial DNA searching to identify a serial killer through a relative's DNA"},{"id":"c","text":"It was the first DNA conviction in the US, based on common forensic laboratory practices"},{"id":"d","text":"It was the first case to use mtDNA, in accordance with traditional forensic approaches"}],"correctAnswer":"b","explanation":"The Grim Sleeper case was notable for using familial DNA searching. The killer's son's DNA in a database partially matched crime scene DNA, leading investigators to the father."},{"id":"t1q190","tier":1,"type":"troubleshooting","stem":"A lab analyst receives two envelopes of evidence from different crime scenes. Both are labeled 'Evidence A' with no case number. What critical error in the chain of custody occurred?","options":[{"id":"a","text":"Evidence labels are not important in DNA analysis"},{"id":"b","text":"Improper labeling means the evidence cannot be reliably associated with a specific crime scene, potentially making it inadmissible"},{"id":"c","text":"The analyst should just assign new random labels, particularly when working with degraded or contaminated samples, according to standard laboratory protocols"},{"id":"d","text":"Having the same label is fine as long as the DNA profiles are different, reflecting the complexity inherent in modern forensic DNA interpretation methods"}],"correctAnswer":"b","explanation":"Proper labeling and chain of custody are essential in forensic science. Without unique identifiers and case numbers, evidence cannot be reliably linked to a specific crime scene or case, potentially making DNA results inadmissible in court."},{"id":"t1q191","tier":1,"type":"whats_wrong","stem":"A student claims: 'STR analysis was introduced in 1985 and immediately replaced all other DNA methods.' What is wrong?","options":[{"id":"a","text":"STR analysis has never been used in forensic science"},{"id":"b","text":"The statement is correct; nothing is wrong, following conventional forensic methodology, reflecting a common understanding of DNA science"},{"id":"c","text":"STR analysis was introduced in 1991, not 1985; and early DNA fingerprinting was used during the transition period"},{"id":"d","text":"STR analysis was introduced in 2000"}],"correctAnswer":"c","explanation":"STR analysis was introduced in 1991, not 1985. DNA fingerprinting (using restriction enzymes and gel electrophoresis) was developed in 1985 by Jeffreys. STR analysis gradually replaced the earlier method but did not do so immediately."},{"id":"t1q192","tier":1,"type":"working_backwards","stem":"A mother has genotype (X,X) at AMEL and the father has (X,Y). Their son's AMEL shows (X,Y). Which allele came from which parent?","options":[{"id":"a","text":"The X came from the mother and the Y came from the father"},{"id":"b","text":"Both alleles came from the mother, though recent advances in forensic technology have challenged this assumption"},{"id":"c","text":"Both X and Y came from the father"},{"id":"d","text":"The Y came from the mother and the X from the father"}],"correctAnswer":"a","explanation":"The mother (X,X) can only contribute an X chromosome. The father (X,Y) contributed the Y chromosome to make their son (X,Y). Males always receive their Y chromosome from their father and an X from their mother."},{"id":"t1q193","tier":1,"type":"multiple_choice","stem":"What is DNA described as in terms of its role in living organisms?","options":[{"id":"a","text":"The genetic material of all living things"},{"id":"b","text":"The waste product of cellular respiration"},{"id":"c","text":"The protective coating of chromosomes"},{"id":"d","text":"The energy source of all cells"}],"correctAnswer":"a","explanation":"DNA is described as the genetic material of all living things. It contains the instructions for building and maintaining an organism."},{"id":"t1q194","tier":1,"type":"multiple_choice","stem":"What is stored inside chromosomes?","options":[{"id":"a","text":"Nuclear DNA"},{"id":"b","text":"Proteins only"},{"id":"c","text":"Red blood cells"},{"id":"d","text":"Mitochondrial DNA only"}],"correctAnswer":"a","explanation":"Nuclear DNA is stored in chromosomes, which are found in the cell nucleus. Humans have 46 chromosomes organized into 23 pairs."},{"id":"t1q195","tier":1,"type":"qualitative_reasoning","stem":"Why was the development of automated machines and computers for STR analysis an important advancement in forensic DNA profiling?","options":[{"id":"a","text":"It eliminated the need for DNA samples entirely"},{"id":"b","text":"It increased speed, accuracy, and consistency while reducing human error in analyzing DNA profiles"},{"id":"c","text":"It made DNA analysis free of charge, and this consideration is particularly important in cases with limited sample quantities"},{"id":"d","text":"It allowed analysis without PCR, though recent advances in forensic technology have challenged this assumption"}],"correctAnswer":"b","explanation":"Automation increased the speed, accuracy, and consistency of DNA analysis while reducing the potential for human error. Automated machines handle fluorescent detection, capillary electrophoresis, and data recording more reliably than manual methods."},{"id":"t1q197","tier":1,"type":"conflicting_contentions","stem":"Student A says: 'PCR changes the DNA sequence so it can be read by machines.' Student B says: 'PCR makes copies of existing DNA without changing its sequence.' Which student is correct?","options":[{"id":"a","text":"Student B, because PCR amplifies (copies) DNA without altering the sequence"},{"id":"b","text":"Neither is correct; PCR is not used in DNA analysis"},{"id":"c","text":"Both are correct; PCR both copies and modifies DNA, which some forensic analysts have historically proposed"},{"id":"d","text":"Student A, because PCR modifies DNA for analysis"}],"correctAnswer":"a","explanation":"Student B is correct. PCR (polymerase chain reaction) amplifies DNA by making millions of identical copies of the original sequence. It does not change or modify the DNA sequence itself."},{"id":"t1q198","tier":1,"type":"linked_mc","stem":"In the Pitchfork case, approximately how many men were asked to provide DNA samples during the manhunt?","options":[{"id":"a","text":"500"},{"id":"b","text":"5,000"},{"id":"c","text":"50,000"},{"id":"d","text":"1,000"}],"correctAnswer":"b","explanation":"Approximately 5,000 men were asked to provide DNA samples during the Pitchfork DNA manhunt in 1987."},{"id":"t1q199","tier":1,"type":"troubleshooting","stem":"A forensic scientist finds that the STR profile from a crime scene matches a profile in CODIS, but the match is to an offender who was in prison at the time of the crime. What should the scientist consider?","options":[{"id":"a","text":"The CODIS database must be entirely wrong, which is a common misconception in forensic analysis"},{"id":"b","text":"The crime did not actually happen, reflecting the complexity inherent in modern forensic DNA interpretation methods"},{"id":"c","text":"Possible sample contamination, laboratory error, or a coincidental match should be investigated"},{"id":"d","text":"The offender must have escaped prison to commit the crime"}],"correctAnswer":"c","explanation":"When a CODIS hit points to someone with a confirmed alibi (such as being incarcerated), the scientist should investigate possible laboratory contamination, sample mix-ups, or data entry errors before drawing conclusions. While extremely rare, coincidental matches should also be considered."},{"id":"t1q200","tier":1,"type":"working_backwards","stem":"Nine skeletons were exhumed from a grave, and STR analysis identified exactly 5 as belonging to the Romanov family. If the Romanov family consisted of the Tsar, Tsarina, and their 5 children (7 total), what does the identification of only 5 suggest?","options":[{"id":"a","text":"Two Romanov family members were missing from this grave and were later found in a second grave in 2006"},{"id":"b","text":"Only 5 members of the family existed"},{"id":"c","text":"STR analysis cannot identify more than 5 people from one grave, though recent advances in forensic technology have challenged this assumption"},{"id":"d","text":"The other 4 skeletons were also Romanovs but could not be tested"}],"correctAnswer":"a","explanation":"The identification of 5 out of 7 Romanov family members from the first grave meant 2 were unaccounted for. In 2006, a second grave was discovered and DNA analysis confirmed the remains of Anastasia and Alexei, the two missing children."},{"id":"t2q001","tier":2,"type":"multiple_choice","stem":"A forensic technician recovers a bloodstain from a doorknob at a crime scene. She places the sample in a sealed plastic bag and stores it in a warm vehicle for transport. Which step in her procedure most likely compromised the DNA evidence?","options":[{"id":"a","text":"Failing to refrigerate the sample at the scene immediately"},{"id":"b","text":"Collecting blood from the doorknob rather than swabbing it"},{"id":"c","text":"Sealing the sample in a plastic bag instead of a paper bag"},{"id":"d","text":"Transporting the sample in a vehicle rather than hand-carrying it"}],"correctAnswer":"c","explanation":"Biological evidence must be air-dried and stored in paper bags, not plastic. Plastic traps moisture, promoting bacterial growth and DNA degradation, especially when combined with warm storage conditions."},{"id":"t2q004","tier":2,"type":"conflicting_contentions","stem":"Two expert witnesses disagree about evidence found at a crime scene. Witness A states: 'The mtDNA match between the hair found at the scene and the suspect proves the suspect was present.' Witness B states: 'An mtDNA match cannot conclusively prove the suspect was present because it is class evidence.' Which witness is more scientifically accurate, and why?","options":[{"id":"a","text":"Witness B, because mtDNA testing is unreliable and courts do not accept it, based on common forensic laboratory practices, especially in cases involving mixed DNA profiles from multiple contributors"},{"id":"b","text":"Witness A, because hair samples always contain enough nuclear DNA for individualization, particularly when working with degraded or contaminated samples"},{"id":"c","text":"Witness B, because mtDNA is inherited maternally and is shared by all maternal relatives, making it class evidence rather than individual identification"},{"id":"d","text":"Witness A, because mtDNA is unique to each individual like nuclear DNA, though this is not universally accepted in the field, though recent advances in forensic technology have challenged this assumption"}],"correctAnswer":"c","explanation":"Witness B is correct. Mitochondrial DNA is inherited exclusively from the mother and is identical among all maternal relatives. This makes it class evidence \u2014 it can include or exclude groups of people but cannot individualize a suspect the way STR profiling of nuclear DNA can."},{"id":"t2q005","tier":2,"type":"linked_mc","stem":"At a burglary scene, investigators collect saliva from a water bottle and blood from broken glass. The STR profile from the saliva matches Suspect X at all 13 CODIS loci. The blood sample, however, matches a different unknown profile. What is the most logical initial interpretation?","options":[{"id":"a","text":"Suspect X is excluded because the blood does not match"},{"id":"b","text":"The blood sample must have been contaminated during collection, which would significantly affect the reliability of the analysis"},{"id":"c","text":"Suspect X committed the burglary alone and the blood was planted, and this factor must be carefully evaluated during the analysis process"},{"id":"d","text":"The evidence suggests at least two individuals were present at the scene"}],"correctAnswer":"d","explanation":"Two distinct STR profiles from two different biological samples at the same scene most logically indicates that at least two individuals were present. This does not exclude Suspect X, whose saliva was found there, nor does it prove contamination without further investigation."},{"id":"t2q006","tier":2,"type":"qualitative_reasoning","stem":"A forensic lab reports that the random match probability for a suspect's STR profile is 1 in 4.2 trillion. The defense attorney argues this statistic is meaningless because 'statistics don't prove guilt.' Evaluate the role of random match probability in forensic casework and explain what this number actually communicates about the evidence.","options":[{"id":"a","text":"A 1 in 4.2 trillion probability means there is a 100% chance the suspect left the DNA, proving guilt beyond doubt, a principle that applies across multiple areas of forensic DNA testing, in accordance with traditional forensic approaches"},{"id":"b","text":"The defense is correct \u2014 probabilities are theoretical and have no evidentiary value in court, though this is not universally accepted in the field, per standard forensic evidence handling procedures, as occasionally referenced in criminal investigations"},{"id":"c","text":"The random match probability quantifies how rare the profile is in a population, meaning the chance another random person shares this profile is astronomically small, but it measures the strength of the DNA association, not guilt itself"},{"id":"d","text":"Random match probability only applies to identical twins, so it is irrelevant here, and this factor must be carefully evaluated during the analysis process, an idea that appears frequently in forensic literature, which highlights the importance of proper training in forensic DNA analysis"}],"correctAnswer":"c","explanation":"Random match probability estimates how likely it is that a randomly selected, unrelated individual would share the same STR profile. A probability of 1 in 4.2 trillion is extraordinarily small, strongly associating the evidence with the suspect. However, it measures the strength of the DNA match, not guilt \u2014 other evidence must establish how and why the DNA was deposited at the scene."},{"id":"t2q007","tier":2,"type":"multiple_choice","stem":"During PCR amplification of a crime scene sample, the thermal cycler completes 30 cycles. If the process started with a single DNA template molecule, approximately how many copies of the target region would be produced?","options":[{"id":"a","text":"30 copies"},{"id":"b","text":"60 copies"},{"id":"c","text":"About 1 million copies"},{"id":"d","text":"About 1 billion copies"}],"correctAnswer":"d","explanation":"PCR doubles the number of DNA copies each cycle. Starting with 1 molecule after 30 cycles yields 2^30 = approximately 1.07 billion copies. This exponential amplification is what makes PCR so powerful for forensic analysis of tiny biological samples."},{"id":"t2q009","tier":2,"type":"multiple_choice","stem":"A mother has the STR genotype (8, 11) at locus D18S51, and the father has genotype (13, 17). Their child's genotype at this locus is being determined. Which of the following is a possible genotype for the child?","options":[{"id":"a","text":"(11, 11)"},{"id":"b","text":"(8, 9)"},{"id":"c","text":"(13, 17)"},{"id":"d","text":"(8, 13)"}],"correctAnswer":"d","explanation":"Each parent contributes one allele per locus through independent assortment. The mother can contribute 8 or 11; the father can contribute 13 or 17. Possible child genotypes are (8,13), (8,17), (11,13), or (11,17). Only option (a) \u2014 (8,13) \u2014 is among these. Options (b), (c), and (d) require alleles neither parent can contribute at this locus."},{"id":"t2q011","tier":2,"type":"conflicting_contentions","stem":"In a paternity dispute, Attorney A argues: 'The alleged father cannot be the biological father because his STR profile only matches the child at 9 out of 13 loci.' Attorney B counters: 'Partial matches at 9 of 13 loci actually support paternity because a father only needs to share one allele per locus with the child.' Who is correct?","options":[{"id":"a","text":"Attorney B, because a biological father shares one allele per locus with the child, and 'matching' means at least one shared allele at each locus \u2014 the claim of 9/13 needs clarification on what 'match' means"},{"id":"b","text":"Attorney B, because fathers only pass DNA to sons, not daughters, following conventional forensic methodology, which would significantly affect the reliability of the analysis, though recent advances in forensic technology have challenged this assumption"},{"id":"c","text":"Attorney A, because STR profiles between parent and child should be identical, which is a common misconception in forensic analysis, which is a key distinction in forensic biology, which some forensic analysts have historically proposed"},{"id":"d","text":"Attorney A, because a true biological father must match the child at all 13 loci, which relates to standard evidence processing methods, in accordance with traditional forensic approaches, and this consideration is particularly important in cases with limited sample quantities"}],"correctAnswer":"a","explanation":"Attorney B raises the critical issue. A biological father must share at least one allele at every locus with the child. If 'match' means sharing at least one allele, a true father should match at all 13 \u2014 so the 9/13 figure could indicate exclusion. However, Attorney B correctly identifies that the definition of 'match' matters. If 9/13 means identical genotype pairs, a father would not be expected to have identical genotypes. The language needs clarification before drawing conclusions."},{"id":"t2q012","tier":2,"type":"linked_mc","stem":"A forensic analyst examines an electropherogram from an STR analysis of a crime scene sample at locus D7S820. The graph shows three distinct peaks at alleles 8, 10, and 12. What does this pattern most likely indicate?","options":[{"id":"a","text":"The sample contains a mixture of DNA from at least two individuals"},{"id":"b","text":"The PCR amplification created a random artifact peak"},{"id":"c","text":"The individual is homozygous for all three alleles, which highlights the importance of proper training in forensic DNA analysis"},{"id":"d","text":"The individual is triploid and has three alleles at this locus, per standard forensic evidence handling procedures"}],"correctAnswer":"a","explanation":"Each person carries at most two alleles per locus (one from each parent). Three peaks at a single locus on an electropherogram is a hallmark indicator of a mixed DNA sample from at least two contributors."},{"id":"t2q013","tier":2,"type":"qualitative_reasoning","stem":"The Innocence Project has used DNA evidence to exonerate over 300 wrongfully convicted individuals. In many of these cases, the original convictions were based on eyewitness testimony. Analyze why DNA profiling has been more reliable than eyewitness identification in these cases, and explain a limitation that DNA evidence still has.","options":[{"id":"a","text":"DNA is more reliable because it is 100% accurate and never produces errors, while eyewitnesses always lie, a perspective that has evolved considerably over the past two decades of research, and this is especially relevant when dealing with trace amounts of biological material, which is a key distinction in forensic biology"},{"id":"b","text":"DNA profiling is unreliable and the Innocence Project exonerations were based on procedural technicalities, not science, as described in forensic science textbooks, following conventional forensic methodology, though this interpretation has been questioned by experts, a principle that applies across multiple areas of forensic DNA testing"},{"id":"c","text":"DNA is more reliable because it is objective biological data with calculable match probabilities, whereas eyewitness memory is susceptible to misidentification, stress, and suggestion. However, DNA evidence cannot explain how or when the DNA was deposited, so presence of DNA does not always prove involvement in a crime."},{"id":"d","text":"DNA and eyewitness testimony are equally reliable; the exonerations resulted from changes in law, not evidence quality, which is an important consideration when interpreting electrophoresis results, and this approach has been adopted by several forensic laboratories worldwide, per standard forensic evidence handling procedures"}],"correctAnswer":"c","explanation":"DNA profiling provides objective, quantifiable evidence with extremely high discrimination power (random match probabilities in the trillions). Eyewitness testimony is subjective and vulnerable to memory distortion, cross-race identification errors, and suggestive lineup procedures. However, DNA's limitation is that it establishes biological presence, not the circumstances of deposition \u2014 secondary transfer, consensual contact, or other innocent explanations may apply."},{"id":"t2q014","tier":2,"type":"multiple_choice","stem":"A forensic scientist is processing a crime scene where a suspect allegedly wore gloves. She collects skin cells from the inside of a discarded latex glove found near the scene. What technique must she use before STR analysis can be performed on this very small biological sample?","options":[{"id":"a","text":"PCR amplification of the extracted DNA"},{"id":"b","text":"Karyotype analysis of the skin cells"},{"id":"c","text":"Restriction enzyme digestion"},{"id":"d","text":"Gel electrophoresis to separate proteins"}],"correctAnswer":"a","explanation":"Touch DNA from skin cells on a glove yields an extremely small quantity of DNA. PCR (Polymerase Chain Reaction) is essential to amplify the tiny amount of DNA into millions of copies, producing enough material for STR analysis to generate a usable profile."},{"id":"t2q016","tier":2,"type":"multiple_choice","stem":"Investigators discover remains in a river after three months. The soft tissue is largely decomposed, but teeth and femur bones are intact. A family claims the remains may be their missing grandmother. Which DNA analysis strategy would be most informative for identification?","options":[{"id":"a","text":"Extract nuclear DNA from soft tissue for STR profiling, though this interpretation has been questioned by experts"},{"id":"b","text":"Use RFLP analysis on the bone marrow"},{"id":"c","text":"Extract mtDNA from teeth or bone and compare to a known maternal relative"},{"id":"d","text":"Perform Y-STR analysis on the femur bone"}],"correctAnswer":"c","explanation":"The remains are from a grandmother (female), so Y-STR is inapplicable. After three months in water, soft tissue DNA is degraded, ruling out soft tissue extraction. mtDNA is ideal because it survives in teeth and bone far longer than nuclear DNA, exists in thousands of copies per cell, and can be compared to any maternal relative. RFLP requires large intact DNA samples and is obsolete."},{"id":"t2q018","tier":2,"type":"conflicting_contentions","stem":"In a murder trial, the prosecution states: 'CODIS matched the defendant's DNA to blood at the crime scene, proving he committed the murder.' The defense argues: 'A CODIS match only proves my client's DNA was at the scene, not that he committed any crime.' Which argument is more scientifically sound?","options":[{"id":"a","text":"The defense, because CODIS databases are known to contain widespread errors making all matches unreliable, as sometimes misinterpreted in forensic casework"},{"id":"b","text":"The prosecution, because a CODIS match at a crime scene is definitive proof of guilt"},{"id":"c","text":"The defense, because a DNA match establishes the biological source of the evidence but does not by itself prove the individual committed the crime"},{"id":"d","text":"The prosecution, because CODIS only contains profiles of convicted criminals, so a match proves criminal behavior"}],"correctAnswer":"c","explanation":"The defense argument is scientifically sound. DNA evidence establishes that biological material from the defendant was present at the scene. However, DNA cannot explain the circumstances of deposition \u2014 the defendant may have been there innocently, the blood could be from a prior event, or secondary transfer could be involved. Guilt must be established by the totality of evidence, not DNA alone."},{"id":"t2q019","tier":2,"type":"linked_mc","stem":"A father has STR genotype (9, 12) and a mother has (14, 15) at a specific locus. Their biological child is tested. Which genotype must the child have at this locus?","options":[{"id":"a","text":"It could be any combination of alleles 9 through 15, as occasionally referenced in criminal investigations"},{"id":"b","text":"It must be (9, 12) or (14, 15)"},{"id":"c","text":"It must be one of four possibilities: (9,14), (9,15), (12,14), or (12,15)"},{"id":"d","text":"It must be (9, 14)"}],"correctAnswer":"c","explanation":"Each parent contributes one allele per locus through meiosis and independent assortment. The father contributes either 9 or 12; the mother contributes either 14 or 15. This produces exactly four possible offspring genotypes: (9,14), (9,15), (12,14), or (12,15)."},{"id":"t2q020","tier":2,"type":"qualitative_reasoning","stem":"The Grim Sleeper case was solved using familial DNA searching \u2014 investigators found a partial match in CODIS to the suspect's son, which led them to the father. Analyze the ethical tension between solving violent crimes through familial searching and the privacy rights of individuals whose relatives are in DNA databases.","options":[{"id":"a","text":"The ethical concerns are irrelevant because DNA databases only contain information about convicted felons who have no rights, and this is especially relevant when dealing with trace amounts of biological material, based on common forensic laboratory practices, which underscores why quality control is essential in forensic laboratories"},{"id":"b","text":"Familial searching raises legitimate concerns because it effectively places innocent relatives under genetic surveillance without their consent or any criminal suspicion, yet it has proven effective in solving otherwise unsolvable violent crimes \u2014 requiring careful policy balancing between public safety and civil liberties"},{"id":"c","text":"There is no ethical tension because anyone related to a criminal forfeits their privacy rights automatically, though recent advances in forensic technology have challenged this assumption, a perspective that has evolved considerably over the past two decades of research, particularly when working with degraded or contaminated samples"},{"id":"d","text":"Familial searching should be banned because it violates the Fourth Amendment in all circumstances, though this interpretation has been questioned by experts, which relates to standard evidence processing methods, and this factor must be carefully evaluated during the analysis process, which highlights the importance of proper training in forensic DNA analysis"}],"correctAnswer":"b","explanation":"Familial DNA searching creates a genuine ethical dilemma. It effectively extends genetic surveillance to relatives who have committed no crime and did not consent to being searchable. However, as the Grim Sleeper case demonstrates, it can solve serial violent crimes that evade all other investigative methods. CODIS also includes arrestee profiles \u2014 people not convicted. Responsible policy requires balancing investigative power against privacy rights, typically by restricting familial searches to serious violent crimes with oversight."},{"id":"t2q021","tier":2,"type":"multiple_choice","stem":"A forensic lab technician accidentally sneezes near an open evidence sample during DNA extraction. She immediately documents the incident. What is the primary concern, and what procedure should follow?","options":[{"id":"a","text":"The sneeze only contains water vapor, so there is no contamination concern, which is an important consideration when interpreting electrophoresis results, a perspective that has evolved considerably over the past two decades of research"},{"id":"b","text":"The sneeze may have introduced her own DNA into the sample; she should provide a reference sample so her profile can be identified and excluded from the results"},{"id":"c","text":"The sample is permanently destroyed and must be discarded, and this factor must be carefully evaluated during the analysis process, as occasionally referenced in criminal investigations"},{"id":"d","text":"The sneeze would only affect fingerprint evidence, not DNA, based on common forensic laboratory practices, especially in cases involving mixed DNA profiles from multiple contributors"}],"correctAnswer":"b","explanation":"Sneezing, talking, and coughing near evidence can introduce the handler's DNA through aerosolized saliva and mucus droplets containing epithelial cells. Proper protocol requires documentation and providing a reference sample for elimination purposes. This is exactly why collection protocols mandate wearing masks and not talking or sneezing over evidence."},{"id":"t2q023","tier":2,"type":"multiple_choice","stem":"A technician performing gel electrophoresis on DNA fragments notices that after running the gel, the smallest fragments have migrated the farthest from the wells. A new trainee asks why this occurs. Which explanation correctly applies the principle?","options":[{"id":"a","text":"Smaller fragments have less electrical charge and are repelled less strongly, though recent advances in forensic technology have challenged this assumption"},{"id":"b","text":"Smaller fragments are attracted to the negative electrode at the far end"},{"id":"c","text":"Smaller fragments are heavier and sink faster through the gel"},{"id":"d","text":"Smaller fragments move more easily through the gel matrix pores, experiencing less resistance, so they travel farther in the same time period"}],"correctAnswer":"d","explanation":"Gel electrophoresis separates DNA fragments by size using an electrical field. All DNA fragments carry a negative charge (due to phosphate groups) and migrate toward the positive electrode. Smaller fragments navigate through the gel's pore matrix with less friction, traveling farther than larger fragments in the same time period. This size-dependent migration is the basis for separation."},{"id":"t2q025","tier":2,"type":"conflicting_contentions","stem":"In the Colin Pitchfork case (1987), a man named Richard Buckland falsely confessed to a murder. When mass DNA screening of local men was conducted, someone else submitted a blood sample on Pitchfork's behalf to avoid testing. Expert A argues: 'This case proves DNA testing is foolproof and eliminates wrongful convictions entirely.' Expert B argues: 'This case actually demonstrates both the power and the human vulnerabilities surrounding DNA evidence.' Who provides the better analysis?","options":[{"id":"a","text":"Expert B, because DNA testing was unreliable in 1987 and should not have been used, an idea that appears frequently in forensic literature, following conventional forensic methodology, which underscores why quality control is essential in forensic laboratories, which is often confused with the correct procedure"},{"id":"b","text":"Expert A, because no wrongful conviction has ever occurred since DNA testing was introduced, which would significantly affect the reliability of the analysis, though this is not universally accepted in the field, and this consideration is particularly important in cases with limited sample quantities"},{"id":"c","text":"Expert B, because while DNA exonerated Buckland and eventually identified Pitchfork, the case also sho
